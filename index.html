<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1b1a17" />
  <title>Tickets — Suivi des dépenses</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    :root{
      --surface:#cfccc2; --paper:#faf7ef; --paper-shade:#efe9db;
      --ink:#1b1a17; --ink-soft:#6f6a5e; --accent:#b23a2e; --line:#d9d3c4;
      --mono: ui-monospace, "SFMono-Regular", "Roboto Mono", Menlo, Consolas, monospace;
    }
    *{ box-sizing:border-box; }
    html,body{ margin:0; }
    body{ background:var(--surface); color:var(--ink); font-family:var(--mono);
      -webkit-font-smoothing:antialiased; padding:env(safe-area-inset-top) 0 0; }
    .app{ max-width:520px; margin:0 auto; padding:18px 14px 108px; }
    .head{ position:relative; text-align:center; padding:14px 0 6px; letter-spacing:.18em; text-transform:uppercase; }
    .hback{ position:absolute; left:6px; top:12px; background:none; border:none; color:var(--ink-soft); font-family:var(--mono); font-size:12px; letter-spacing:.06em; padding:5px 6px; }
    .head h1{ font-size:14px; margin:0 0 4px; font-weight:700; }
    .head .sub{ font-size:10px; color:var(--ink-soft); letter-spacing:.22em; }
    .rule{ border:0; border-top:1px dashed var(--ink-soft); margin:12px 0; opacity:.6; }
    .paper{ position:relative; background:var(--paper); padding:18px 16px;
      box-shadow:0 1px 0 rgba(0,0,0,.04), 0 10px 24px rgba(0,0,0,.10); }
    .paper.torn::after{ content:""; position:absolute; bottom:-9px; left:0; width:100%; height:10px;
      background:
        linear-gradient(45deg, transparent 33%, var(--paper) 33%, var(--paper) 67%, transparent 67%),
        linear-gradient(-45deg, transparent 33%, var(--paper) 33%, var(--paper) 67%, transparent 67%);
      background-size:14px 18px; }
    .leader{ display:flex; align-items:baseline; gap:.4em; font-size:13px; padding:3px 0; }
    .leader .lbl{ white-space:nowrap; }
    .leader .fill{ flex:1; border-bottom:1px dotted var(--ink-soft); transform:translateY(-3px); opacity:.7; }
    .leader .val{ white-space:nowrap; font-variant-numeric:tabular-nums; }
    .total .lbl{ font-weight:700; letter-spacing:.05em; text-transform:uppercase; }
    .total .val{ font-size:22px; font-weight:700; color:var(--accent); }
    .muted{ color:var(--ink-soft); }
    .center{ text-align:center; }
    .entry{ padding:11px 4px; border-bottom:1px dashed var(--line); }
    .entry .row1{ display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
    .entry .name{ font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .entry .amt{ font-variant-numeric:tabular-nums; font-weight:700; white-space:nowrap; }
    .entry .row2{ display:flex; justify-content:space-between; font-size:11px; color:var(--ink-soft); margin-top:2px; }
    .cat{ display:inline-block; border:1px solid var(--ink-soft); padding:1px 7px; font-size:10px;
      text-transform:uppercase; letter-spacing:.06em; }
    button{ font-family:var(--mono); cursor:pointer; }
    .fab{ position:fixed; left:50%; transform:translateX(-50%); bottom:22px;
      background:var(--ink); color:var(--paper); border:none; padding:14px 26px;
      font-size:14px; letter-spacing:.08em; text-transform:uppercase; font-weight:700;
      border-radius:2px; box-shadow:0 8px 20px rgba(0,0,0,.28); }
    .fab:active{ transform:translateX(-50%) translateY(1px); }
    .btn{ background:none; border:1px solid var(--ink); color:var(--ink); padding:10px 14px;
      text-transform:uppercase; letter-spacing:.06em; font-size:12px; }
    .btn.primary{ background:var(--ink); color:var(--paper); }
    .btn.ghost{ border-color:var(--line); color:var(--ink-soft); }
    .btns{ display:flex; gap:10px; margin-top:16px; }
    .btns .btn{ flex:1; }
    label.f{ display:block; font-size:11px; text-transform:uppercase; letter-spacing:.08em;
      color:var(--ink-soft); margin:14px 0 5px; }
    input.f, select.f{ width:100%; font-family:var(--mono); font-size:16px; padding:10px 8px;
      border:none; border-bottom:1px solid var(--ink); background:var(--paper-shade); color:var(--ink); }
    input.f:focus, select.f:focus{ outline:2px solid var(--accent); outline-offset:1px; }
    .chips{ display:flex; flex-wrap:wrap; gap:8px; }
    .chip{ border:1px solid var(--ink-soft); background:none; color:var(--ink); padding:7px 11px;
      font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
    .chip.on{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
    .scanbox{ text-align:center; padding:22px 12px; border:1px dashed var(--ink-soft); margin-bottom:6px; }
    .progress{ height:6px; background:var(--paper-shade); margin-top:14px; overflow:hidden; }
    .progress > i{ display:block; height:100%; background:var(--accent); transition:width .2s; }
    .empty{ text-align:center; color:var(--ink-soft); padding:30px 10px; font-size:13px; line-height:1.6; }
    .offline-bar{ text-align:center; margin:20px 0 6px; font-size:12px; letter-spacing:.06em; }
    .barcode{ height:26px; margin:8px auto 0; width:60%;
      background:repeating-linear-gradient(90deg,var(--ink) 0 1px,transparent 1px 3px,var(--ink) 3px 4px,transparent 4px 7px); }
    .art{ margin:10px 0; padding:8px; background:var(--paper-shade); border-left:3px solid var(--line); }
    .art .art-name{ background:var(--paper); font-size:14px; }
    .art-row{ display:flex; gap:6px; align-items:center; margin-top:5px; }
    .art-row .art-prix{ flex:0 0 84px; }
    .art-row .art-prod{ flex:1; font-size:13px; }
    .art-row .art-del{ flex:0 0 auto; padding:8px 11px; }
    .art-com{ display:flex; align-items:center; gap:8px; margin-top:7px; font-size:12px; color:var(--ink-soft); }
    .art-com input{ width:18px; height:18px; accent-color:var(--accent); flex:0 0 auto; }
    .leader.fam{ margin-top:8px; }
    .leader.fam .lbl{ font-weight:700; text-transform:uppercase; letter-spacing:.05em; }
    .leader.fam .val{ font-weight:700; color:var(--accent); }
    .leader.item{ font-size:12px; padding-left:16px; }
    .leader.item .lbl, .leader.item .val{ color:var(--ink-soft); }
    .prow{ display:flex; gap:8px; align-items:center; padding:8px 4px; border-bottom:1px dashed var(--line); }
    .prow .pname{ flex:1; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .prow .pfam{ flex:0 0 148px; font-size:13px; }
    .prow .pdel{ flex:0 0 auto; padding:6px 9px; }
    .prow .pren{ flex:0 0 auto; padding:6px 9px; }
    .prow .pdelfam{ flex:0 0 auto; padding:6px 9px; }
    .prow .catren, .prow .catdel{ flex:0 0 auto; padding:6px 9px; }
    .prow .fxedit, .prow .fxdel{ flex:0 0 auto; padding:6px 9px; }
    .pname.pedit{ text-decoration:underline dotted; text-underline-offset:3px; }
    .bar-row{ margin:12px 2px; }
    .bar-top{ display:flex; justify-content:space-between; align-items:baseline; font-size:12px; margin-bottom:4px; }
    .bar-top .bl{ text-transform:uppercase; letter-spacing:.04em; }
    .bar-top .bv{ font-variant-numeric:tabular-nums; font-weight:700; }
    .bar-track{ height:16px; background:var(--paper-shade); border:1px solid var(--line); overflow:hidden; }
    .bar-track > i{ display:block; height:100%; background:var(--accent); }
    .bar-row.clk{ cursor:pointer; }
    .leader.item.itemclk{ cursor:pointer; }
    .leader.item.itemclk .lbl{ text-decoration:underline dotted; text-underline-offset:3px; }
    .checkrow{ display:flex; align-items:center; gap:10px; padding:9px 2px; font-size:13px; border-bottom:1px dashed var(--line); }
    .checkrow input{ width:18px; height:18px; accent-color:var(--accent); flex:0 0 auto; }
    .checkrow .ctot{ margin-left:auto; font-variant-numeric:tabular-nums; font-weight:700; color:var(--ink-soft); }
    .graph-block{ margin-top:18px; }
    .graph-block .gtitle{ font-weight:700; text-transform:uppercase; letter-spacing:.05em; font-size:12px; color:var(--accent); margin:6px 0 8px; }
    .seg{ display:flex; border:1px solid var(--ink-soft); margin:14px 0 2px; }
    .seg button{ flex:1; background:none; border:none; padding:9px 4px; font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); }
    .seg button.on{ background:var(--ink); color:var(--paper); }
    .lgd{ display:flex; align-items:center; gap:8px; width:100%; background:none; border:none; padding:8px 2px; border-bottom:1px dashed var(--line); font-family:var(--mono); font-size:12px; color:var(--ink); text-align:left; }
    .lgd .sw{ width:12px; height:12px; flex:0 0 auto; border-radius:2px; }
    .lgd .ln{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .lgd .lv{ font-variant-numeric:tabular-nums; color:var(--ink-soft); }
    .lgd .lp{ flex:0 0 42px; text-align:right; font-variant-numeric:tabular-nums; color:var(--accent); font-weight:700; }
    .lgd.off{ opacity:.45; }
    .lgd.off .ln{ text-decoration:line-through; }
    .lgd.off .lp{ color:var(--ink-soft); font-weight:400; }
    .nav{ position:fixed; left:0; right:0; bottom:0; z-index:60; display:flex; flex-direction:column;
      background:var(--paper); border-top:1px dashed var(--ink-soft);
      padding:0 4px calc(4px + env(safe-area-inset-bottom)); box-shadow:0 -6px 18px rgba(0,0,0,.10); }
    .nav.hidden{ display:none; }
    .navscanrow{ display:flex; justify-content:center; }
    .navscanrow button{ background:var(--ink); color:var(--paper); border:none; width:56px; height:56px;
      border-radius:50%; margin-top:-22px; box-shadow:0 6px 16px rgba(0,0,0,.32); font-family:var(--mono);
      font-size:10px; letter-spacing:.06em; text-transform:uppercase; font-weight:700; }
    .navscanrow button:active{ transform:translateY(1px); }
    .navtabs{ display:flex; }
    .navtabs .navi{ flex:1; background:none; border:none; color:var(--ink-soft); font-family:var(--mono);
      font-size:9px; letter-spacing:.01em; text-transform:uppercase; padding:6px 0 8px; position:relative; }
    .navtabs .navi.on{ color:var(--accent); font-weight:700; }
    .navtabs .navi.on::before{ content:""; position:absolute; top:0; left:22%; right:22%; height:2px; background:var(--accent); }
    @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
  </style>
</head>
<body>
  <div id="app" class="app"></div>
  <input id="filein" type="file" accept="image/*" multiple style="display:none" />
  <input id="restorein" type="file" accept="application/json,.json" style="display:none" />

  <script>
  (function(){
    "use strict";
    var mem = {};
    var store = {
      read: function(k, def){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):def; }catch(e){ return (k in mem)?mem[k]:def; } },
      write: function(k, val){ try{ localStorage.setItem(k, JSON.stringify(val)); }catch(e){ mem[k]=val; } }
    };

    var CATS = store.read("cats", null) || ["Alimentation","Restaurant","Carburant","Maison","Santé","Transport","Loisirs","Autre"];
    if(CATS.indexOf("Autre")<0) CATS.push("Autre");
    function persistCats(){ store.write("cats", CATS); }
    var KEYWORDS = {
      "Alimentation":["carrefour","leclerc","lidl","aldi","intermarch","super u","hyper u","casino","monoprix","auchan","netto","cora","biocoop","grand frais","franprix"],
      "Carburant":["total","esso"," bp ","station","avia","agip","gasoil","sp95","sp98","carburant"],
      "Restaurant":["restaurant","mcdo","mcdonald","burger","kebab","pizz","boulang","cafe","brasserie"],
      "Maison":["leroy merlin","castorama","brico","weldom","mr bricolage","point p","gedimat","ikea"],
      "Santé":["pharmacie","parapharm","optique","mutuelle"],
      "Transport":["sncf","peage","autoroute","parking","ratp"],
      "Loisirs":["fnac","decathlon","cultura","micromania"]
    };
    var FAMILLES = store.read("familles", null) || ["Nourriture","Boissons","Vêtements","Divers"];
    if(FAMILLES.indexOf("Divers")<0) FAMILLES.push("Divers");
    function persistFamilles(){ store.write("familles", FAMILLES); }
    var DEFAULT_PROD = FAMILLES.concat(["Tomates","Yaourts","Pain","Lait","Œufs","Fromage","Pâtes","Riz","Café","Fruits","Légumes","Viande","Éponges","Lessive","Produits ménagers"]);
    var PRODUITS = store.read("produits", null) || DEFAULT_PROD.slice();
    (function(){ var miss=FAMILLES.filter(function(f){ return PRODUITS.indexOf(f)<0; }); if(miss.length) PRODUITS = miss.concat(PRODUITS); })();
    if(PRODUITS.indexOf("Remise")<0) PRODUITS.push("Remise");
    function persistProd(){ store.write("produits", PRODUITS); }
    var fraisCommuns = store.read("fraisCommuns", []);
    function persistFrais(){ store.write("fraisCommuns", fraisCommuns); }
    var argentMois = store.read("argentMois", {});
    function persistArgent(){ store.write("argentMois", argentMois); }
    function getArgent(p,m){ return (argentMois[p] && argentMois[p][m]) || 0; }
    function setArgent(p,m,v){ if(!argentMois[p]) argentMois[p]={}; argentMois[p][m]=v; persistArgent(); }

    var APPRIS = store.read("appris", {});
    function persistAppris(){ store.write("appris", APPRIS); }
    function norm(s){ return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z ]/g," ").replace(/\s+/g," ").trim(); }
    function lookupAppris(label){
      var n=norm(label); if(!n) return "";
      if(APPRIS[n]) return APPRIS[n];
      var best="", bestKey="";
      for(var k in APPRIS){ if(k.length>=3 && (n.indexOf(k)>=0 || k.indexOf(n)>=0) && k.length>bestKey.length){ bestKey=k; best=APPRIS[k]; } }
      return best;
    }

    var DEFAULT_FAMILLE_DE = { "Tomates":"Nourriture","Yaourts":"Nourriture","Pain":"Nourriture","Lait":"Nourriture","Œufs":"Nourriture","Fromage":"Nourriture","Pâtes":"Nourriture","Riz":"Nourriture","Café":"Boissons","Fruits":"Nourriture","Légumes":"Nourriture","Viande":"Nourriture","Éponges":"Divers","Lessive":"Divers","Produits ménagers":"Divers","Remise":"Divers" };
    var FAMILLE_DE = store.read("familleDe", null) || {};
    (function(){ for(var k in DEFAULT_FAMILLE_DE){ if(!(k in FAMILLE_DE)) FAMILLE_DE[k]=DEFAULT_FAMILLE_DE[k]; } FAMILLES.forEach(function(f){ FAMILLE_DE[f]=f; }); })();
    function persistFamille(){ store.write("familleDe", FAMILLE_DE); }
    function familleOf(p){ return FAMILLE_DE[p] || "Divers"; }
    function classifyArticle(a){
      var amt=Number(a.prix)||0, prod=a.produit||"", fam, name;
      if(prod==="Remise"){ return { fam:"Remise", name:"Remise", amt:amt }; }
      if(prod && FAMILLES.indexOf(prod)<0){ fam=familleOf(prod); name=prod; }
      else { fam=(prod && FAMILLES.indexOf(prod)>=0)?prod:"Divers"; name=(a.label||"").trim()||"Autres"; }
      return { fam:fam, name:name, amt:amt };
    }

    function guessCat(text){
      var t=(text||"").toLowerCase();
      for(var i=0;i<CATS.length;i++){ var c=CATS[i], kws=KEYWORDS[c]||[]; for(var j=0;j<kws.length;j++){ if(t.indexOf(kws[j])>=0) return c; } }
      return "Autre";
    }

    function parseTicket(text){
      var lines = text.split(/\n/).map(function(l){return l.trim();}).filter(Boolean);
      var amtRe = /(\d{1,4})[.,](\d{2})\b/g;
      var key = /total|a payer|à payer|net a|net à|montant|carte|especes|espèces|rendu|tva/i;
      var all = [], lignes = [];
      lines.forEach(function(l){
        var m, last=null; amtRe.lastIndex=0;
        while((m=amtRe.exec(l))){ all.push({ value: parseFloat(m[1]+"."+m[2]), line:l }); last=m; }
        if(key.test(l) || !last) return;
        var prix = parseFloat(last[1]+"."+last[2]);
        var label = l.replace(/(\d{1,4})[.,](\d{2})\b/g," ").replace(/[^0-9A-Za-zÀ-ÿ ]+/g," ").replace(/\s+/g," ").trim();
        if(label.length < 2) return;
        lignes.push({ label: label.slice(0,28), prix: String(prix).replace(".",","), produit:"" });
      });
      var flagged = all.filter(function(a){ return /total|a payer|à payer|net a|net à|montant/i.test(a.line); });
      var total = "";
      if(flagged.length) total = Math.max.apply(null, flagged.map(function(a){return a.value;}));
      else if(all.length) total = Math.max.apply(null, all.map(function(a){return a.value;}));
      var date="";
      var dm = text.match(/\b(\d{2})[\/.\-](\d{2})[\/.\-](\d{2,4})\b/);
      if(dm){ var y=dm[3].length===2?"20"+dm[3]:dm[3]; date=y+"-"+dm[2]+"-"+dm[1]; }
      var marchand="";
      for(var i=0;i<lines.length;i++){ if(/[A-Za-zÀ-ÿ]{3,}/.test(lines[i])){ marchand=lines[i].slice(0,32); break; } }
      return { total: total, date: date, marchand: marchand, categorie: guessCat(text), lignes: lignes };
    }

    function todayISO(){ return new Date().toISOString().slice(0,10); }
    function fmt(n){ return (Number(n)||0).toFixed(2).replace(".",",")+" €"; }
    function monthKey(iso){ return (iso||todayISO()).slice(0,7); }
    function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]; }); }
    function num(x){ return parseFloat(String(x).replace(",","."))||0; }

    var state = {
      entries: store.read("entries", []),
      view: "list", draft: null,
      offline: store.read("offlineReady", false) ? "ready" : "idle",
      busy: false, prog: 0, scanMsg: "", note: "", graphSel: null, graphPeriod: "cur", graphDim: "fam", graphType: "donut", graphHide: {}, histCat: "", histMonth: null, artSel: null
    };
    function persist(){ store.write("entries", state.entries); }

    var app = document.getElementById("app");
    var filein = document.getElementById("filein");
    var restorein = document.getElementById("restorein");

    var navEl=document.createElement("nav"); navEl.className="nav hidden"; navEl.id="nav";
    navEl.innerHTML=
      '<div class="navscanrow"><button id="navscan" type="button">Scan</button></div>'+
      '<div class="navtabs">'+
        '<button class="navi" type="button" data-view="list">Accueil</button>'+
        '<button class="navi" type="button" data-view="articles">Articles</button>'+
        '<button class="navi" type="button" data-view="communes">Commun</button>'+
        '<button class="navi" type="button" data-view="compte">Compte</button>'+
        '<button class="navi" type="button" data-view="graph">Graphes</button>'+
        '<button class="navi" type="button" data-view="history">Histo.</button>'+
      '</div>';
    document.body.appendChild(navEl);
    [].forEach.call(navEl.querySelectorAll(".navi"), function(b){
      b.onclick=function(){ var v=b.getAttribute("data-view"); if(v==="history") state.histMonth=null; if(v==="articles") state.artSel=null; state.view=v; render(); };
    });
    document.getElementById("navscan").onclick=function(){ filein.click(); };
    function setNav(active, show){
      navEl.className = "nav" + (show ? "" : " hidden");
      [].forEach.call(navEl.querySelectorAll(".navi"), function(b){
        if(b.getAttribute("data-view")===active) b.classList.add("on"); else b.classList.remove("on");
      });
    }

    function header(back){
      var b = back ? '<button class="hback" id="hback" type="button">‹ Retour</button>' : '';
      return '<header class="head">'+b+'<h1>Tickets — Dépenses</h1>'+
             '<div class="sub">suivi local · sans compte</div><div class="barcode"></div></header>';
    }
    function bindBack(fn){ var hb=document.getElementById("hback"); if(hb) hb.onclick=fn; }

    function render(){
      if(state.view==="form") return renderForm();
      if(state.view==="articles") return renderArticles();
      if(state.view==="produits") return renderProduits();
      if(state.view==="graph") return renderGraph();
      if(state.view==="history") return renderHistory();
      if(state.view==="month") return renderMonth();
      if(state.view==="artDetail") return renderArtDetail();
      if(state.view==="communes") return renderCommunes();
      if(state.view==="compte") return renderCompte();
      return renderList();
    }

    function renderList(){
      var month = monthKey(todayISO());
      var mois = state.entries.filter(function(e){ return monthKey(e.date)===month; });
      var totalMois = mois.reduce(function(s,e){ return s+(Number(e.montant)||0); }, 0);
      var parCat = {};
      mois.forEach(function(e){ parCat[e.categorie]=(parCat[e.categorie]||0)+(Number(e.montant)||0); });
      var cats = Object.keys(parCat).sort(function(a,b){ return parCat[b]-parCat[a]; });
      var monthLabel = new Date().toLocaleDateString("fr-FR",{month:"long",year:"numeric"});

      var h = header();
      h += '<section class="paper torn">';
      h += '<div class="center muted" style="font-size:11px;letter-spacing:.18em;text-transform:uppercase">'+esc(monthLabel)+'</div>';
      h += '<hr class="rule">';
      if(cats.length===0) h += '<div class="center muted" style="font-size:12px">Aucune dépense ce mois-ci</div>';
      cats.forEach(function(c){
        h += '<div class="leader"><span class="lbl">'+esc(c)+'</span><span class="fill"></span><span class="val">'+fmt(parCat[c])+'</span></div>';
      });
      h += '<hr class="rule"><div class="leader total"><span class="lbl">Total</span><span class="fill"></span><span class="val">'+fmt(totalMois)+'</span></div>';
      var parPayeur={}, payOrder=[];
      mois.forEach(function(e){ var p=(e.payePar||"").trim()||"Non renseigné"; if(!(p in parPayeur)){ parPayeur[p]=0; payOrder.push(p); } parPayeur[p]+=Number(e.montant)||0; });
      if(payOrder.length){
        payOrder.sort();

    function newDraft(){ state.note=""; state.draft={id:null,montant:"",date:todayISO(),marchand:"",categorie:"Autre",articles:[],payePar:""}; state.view="form"; render(); }
    function editEntry(id){
      var e=state.entries.filter(function(x){ return String(x.id)===String(id); })[0];
      if(!e) return;
      state.draft={id:e.id,montant:e.montant,date:e.date,marchand:e.marchand,categorie:e.categorie,payePar:e.payePar||"",
        articles:(e.articles||[]).map(function(a){ return {label:a.label,prix:a.prix,produit:a.produit,commun:!!a.commun}; })};
      state.view="form"; render();
    }
    function saveDraft(){
      readForm();
      var montant=num(state.draft.montant);
      if(!montant){ var f=document.getElementById("f-montant"); if(f) f.focus(); return; }
      var arts=(state.draft.articles||[]).map(function(a){
          var pr=num(a.prix), prod=(a.produit==="__new"?"":a.produit)||"";
          if(prod==="Remise") pr=-Math.abs(pr);
          return {label:(a.label||"").trim(), prix:pr, produit:prod, commun:!!a.commun};
        }).filter(function(a){ return a.label || a.produit || a.prix; });
      var entry={ id:state.draft.id, montant:montant, date:state.draft.date||todayISO(),
        marchand:(state.draft.marchand||"").trim()||"Sans nom", categorie:state.draft.categorie, payePar:(state.draft.payePar||""), articles:arts };
      arts.forEach(function(a){ if(a.produit && a.label){ APPRIS[norm(a.label)]=a.produit; } });
      persistAppris();
      if(entry.id){ state.entries=state.entries.map(function(e){ return String(e.id)===String(entry.id)?entry:e; }); }
      else { entry.id=Date.now(); state.entries.unshift(entry); }
      persist(); state.view="list"; state.draft=null; render();
    }
    function delDraft(){
      if(state.draft && state.draft.id){ state.entries=state.entries.filter(function(e){ return String(e.id)!==String(state.draft.id); }); persist(); }
      state.view="list"; state.draft=null; render();

    function uniquePersons(){
      var set={}, arr=[];
      function add(w){ w=(w||"").trim(); if(w && w!=="Commun" && !set[w]){ set[w]=1; arr.push(w); } }
      fraisCommuns.forEach(function(f){ add(f.personne); });
      state.entries.forEach(function(e){ add(e.payePar); });
      arr.sort(); return arr;
    }
    function choosePerson(current){
      var ex=uniquePersons();
      if(ex.indexOf("Commun")<0) ex.unshift("Commun");
      var hint = "\nChoix : "+ex.map(function(p,i){ return (i+1)+". "+p; }).join("   ");
      var ans=window.prompt("Pour qui ce frais ?\n(« Commun » = dépense partagée)"+hint+"\n\nTape un nom ou le numéro", current||"Commun");
      if(ans===null) return null;
      ans=ans.trim();
      if(!ans) return current||"Commun";
      if(/^\d+$/.test(ans)){ var n=parseInt(ans,10); if(n>=1 && n<=ex.length) return ex[n-1]; }
      return ans;
    }
    function addFraisCommun(){
      var label=(window.prompt("Nom du frais (ex. Loyer, Internet) :")||"").trim();
      if(!label) return;
      var mv=window.prompt("Montant (€) :","");
      if(mv===null) return;
      var who=choosePerson(null);
      if(who===null) return;
      var rec=window.confirm("Récurrent chaque mois ?\n\nOK = chaque mois · Annuler = seulement ce mois-ci");
      fraisCommuns.push({ id:Date.now(), label:label, montant:num(mv), personne:who, recurrent:rec, month: rec?null:monthKey(todayISO()) });
      persistFrais(); render();
    }

      var who=choosePerson(f.personne); if(who!==null) f.personne=who;

    function renderCommunes(){
      var month = monthKey(todayISO());
      var monthLabel = new Date().toLocaleDateString("fr-FR",{month:"long",year:"numeric"});
      var frais=fraisCommuns.filter(function(f){ return f.recurrent || f.month===month; });
      var byPerson={}, persons=[], fraisTotal=0;
      frais.forEach(function(f){
        var who=(f.personne||"").trim()||"Commun";
        if(!byPerson[who]){ byPerson[who]={total:0, items:[]}; persons.push(who); }
        byPerson[who].total+=Number(f.montant)||0; byPerson[who].items.push(f);
        fraisTotal+=Number(f.montant)||0;
      });
      var others=persons.filter(function(p){ return p!=="Commun"; }).sort();
      var communTotal=byPerson["Commun"]?byPerson["Commun"].total:0;

      var rows=[], prodTotal=0;
      state.entries.filter(function(e){ return monthKey(e.date)===month; }).forEach(function(e){
        (e.articles||[]).forEach(function(a){
          if(!a.commun) return;
          var amt=Number(a.prix)||0;
          var lbl=(a.label||"").trim() || a.produit || "Article";
          rows.push({ id:e.id, marchand:e.marchand, date:e.date, label:lbl, prix:amt });
          prodTotal+=amt;
        });
      });
      rows.sort(function(a,b){ return String(b.date||"").localeCompare(String(a.date||"")); });

          s2+='<div class="prow"><span class="pname">'+esc(f.label)+' <span class="muted" style="font-size:10px">'+(f.recurrent?"· chaque mois":"· ce mois")+'</span></span>'+

             '<button class="btn ghost fxedit" type="button" data-id="'+esc(f.id)+'">✎</button>'+
             '<button class="btn ghost fxdel" type="button" data-id="'+esc(f.id)+'">✕</button></div>';
        });
        return s2;
      }

      var h=header()+'<section class="paper torn">';
      h+='<div class="center muted" style="font-size:11px;letter-spacing:.18em;text-transform:uppercase">Dépenses communes · '+esc(monthLabel)+'</div><hr class="rule">';

      h+='<div class="leader fam"><span class="lbl">Commun</span><span class="fill"></span><span class="val">'+fmt(communTotal)+'</span></div>';
      if(byPerson["Commun"]) h+=fraisRows(byPerson["Commun"].items);
      else h+='<div class="muted" style="font-size:11px;margin:4px 2px">Aucun frais commun. Touche « + Ajouter un frais fixe » et garde « Commun ».</div>';

      h+='<hr class="rule"><div class="leader fam"><span class="lbl">Produits communs (à deux)</span><span class="fill"></span><span class="val">'+fmt(prodTotal)+'</span></div>';
      if(rows.length===0){
        h+='<div class="muted" style="font-size:11px;margin:2px 2px 4px">Aucun produit coché ce mois-ci. Coche « Dépense à deux » sur les articles d\'un ticket.</div>';
      } else {
        h+='<div class="muted" style="font-size:11px;margin:2px 2px 6px">Touche une ligne pour modifier le ticket.</div>';
        rows.forEach(function(r){
          h+='<div class="entry" data-id="'+esc(r.id)+'">'+
               '<div class="row1"><span class="name">'+esc(r.label)+'</span><span class="amt">'+fmt(r.prix)+'</span></div>'+
               '<div class="row2"><span>'+esc(r.marchand||"")+'</span><span>'+esc((r.date||"").split("-").reverse().join("/"))+'</span></div>'+
             '</div>';
        });
        h+='<div class="leader"><span class="lbl">Part de chacun (÷2)</span><span class="fill"></span><span class="val">'+fmt(prodHalf)+'</span></div>';
      }

      others.forEach(function(who){
        var g=byPerson[who];
        h+='<hr class="rule"><div class="leader fam"><span class="lbl">'+esc(who)+'</span><span class="fill"></span><span class="val">'+fmt(g.total)+'</span></div>';
        h+=fraisRows(g.items);
      });

      h+='<button class="btn ghost" id="addfrais" type="button" style="margin-top:12px">+ Ajouter un frais fixe</button>';
      if(frais.length) h+='<div class="leader" style="margin-top:8px"><span class="lbl">Total frais fixes</span><span class="fill"></span><span class="val">'+fmt(fraisTotal)+'</span></div>';

      if(others.length){
        h+='<hr class="rule"><div class="muted" style="font-size:11px;letter-spacing:.06em;text-transform:uppercase;margin:0 2px 2px">Total du mois par personne</div>';
        h+='<div class="muted" style="font-size:10px;margin:0 2px 8px">frais perso + ½ commun + ½ produits communs</div>';

      });

    function normName(s){ return (s||"").trim().toLowerCase(); }
    function takenAs(name){

      for(var j=0;j<PRODUITS.length;j++){ if(FAMILLES.indexOf(PRODUITS[j])<0 && PRODUITS[j]!=="Remise" && normName(PRODUITS[j])===n) return "produit"; }

      var name=(window.prompt("Renommer la grande catégorie :", old)||"").trim();

      var idx=FAMILLES.indexOf(old); if(idx>=0) FAMILLES[idx]=name;
      var pidx=PRODUITS.indexOf(old); if(pidx>=0) PRODUITS[pidx]=name;

    function deleteFamille(name){

      if(!name) return;
      var w=takenAs(name); if(w){ window.alert("« "+name+" » existe déjà comme "+w+".\nSupprime-le d'abord (✕) ou choisis un autre nom."); return; }
      var fam=pickFamille("Divers");
      PRODUITS.push(name); FAMILLE_DE[name]=fam;
      persistProd(); persistFamille(); render();
    }
    function renameProduct(old){
      if(old==="Remise") return;
      var name=(window.prompt("Renommer le produit :", old)||"").trim();
      if(!name || name===old) return;
      var w=takenAs(name); if(w && normName(name)!==normName(old)){ window.alert("« "+name+" » existe déjà comme "+w+".\nSupprime-le d'abord (✕) ou choisis un autre nom."); return; }
      var pidx=PRODUITS.indexOf(old); if(pidx>=0) PRODUITS[pidx]=name;
      if(old in FAMILLE_DE){ FAMILLE_DE[name]=FAMILLE_DE[old]; delete FAMILLE_DE[old]; }
      for(var k in APPRIS){ if(APPRIS[k]===old) APPRIS[k]=name; }
      state.entries.forEach(function(e){ (e.articles||[]).forEach(function(a){ if(a.produit===old) a.produit=name; }); });
      persistProd(); persistFamille(); persistAppris(); persist(); render();
    }
    function addCat(){
      var name=(window.prompt("Nom de la nouvelle catégorie de ticket :")||"").trim();
      if(!name) return;
      if(CATS.indexOf(name)>=0){ window.alert("Cette catégorie existe déjà."); return; }
      var ai=CATS.indexOf("Autre"); if(ai<0) CATS.push(name); else CATS.splice(ai,0,name);
      persistCats(); render();
    }
    function renameCat(old){
      if(old==="Autre"){ window.alert("« Autre » ne peut pas être renommée (catégorie de repli)."); return; }
      var name=(window.prompt("Renommer la catégorie de ticket :", old)||"").trim();
      if(!name || name===old) return;
      if(CATS.indexOf(name)>=0){ window.alert("Cette catégorie existe déjà."); return; }
      var i=CATS.indexOf(old); if(i>=0) CATS[i]=name;
      if(KEYWORDS[old]){ KEYWORDS[name]=KEYWORDS[old]; delete KEYWORDS[old]; }
      state.entries.forEach(function(e){ if(e.categorie===old) e.categorie=name; });
      persistCats(); persist(); render();
    }
    function deleteCat(name){
      if(name==="Autre"){ window.alert("« Autre » ne peut pas être supprimée."); return; }
      var i=CATS.indexOf(name); if(i>=0) CATS.splice(i,1);
      if(KEYWORDS[name]) delete KEYWORDS[name];
      state.entries.forEach(function(e){ if(e.categorie===name) e.categorie="Autre"; });
      persistCats(); persist(); render();
    }
    function renderProduits(){
      var h=header("list")+'<section class="paper">';
      h+='<label class="f">Catégories de ticket</label>';
      CATS.forEach(function(c){
        var protc=(c==="Autre");
        h+='<div class="prow"><span class="pname">'+esc(c)+'</span>'+
           '<button class="btn ghost catren" type="button" data-cat="'+esc(c)+'">✎</button>'+
           '<button class="btn ghost catdel" type="button"'+(protc?' disabled style="opacity:.3"':'')+' data-cat="'+esc(c)+'">✕</button></div>';
      });
      h+='<button class="btn ghost" id="addcat" type="button" style="margin-top:10px">+ Ajouter une catégorie de ticket</button>';
      h+='<label class="f" style="margin-top:22px">Grandes catégories (produits)</label>';
      FAMILLES.forEach(function(f){
        var prot=(f==="Divers");
        h+='<div class="prow"><span class="pname">'+esc(f)+'</span>'+
           '<button class="btn ghost pren" type="button" data-fam="'+esc(f)+'">✎</button>'+
           '<button class="btn ghost pdelfam" type="button"'+(prot?' disabled style="opacity:.3"':'')+' data-fam="'+esc(f)+'">✕</button></div>';
      });
      h+='<button class="btn ghost" id="addfam" type="button" style="margin-top:10px">+ Ajouter une grande catégorie</button>';

      var list = PRODUITS.filter(function(p){ return FAMILLES.indexOf(p)<0 && p!=="Remise"; });
      h+='<label class="f" style="margin-top:22px">Produits (appuie sur le nom pour renommer)</label>';
      if(list.length===0) h+='<div class="muted" style="font-size:12px">Aucun produit personnalisé pour l\'instant.</div>';
      list.forEach(function(p){
        var opts="";
        FAMILLES.forEach(function(f){ opts+='<option value="'+esc(f)+'"'+(familleOf(p)===f?" selected":"")+'>'+esc(f)+'</option>'; });
        h+='<div class="prow"><span class="pname pedit" data-p="'+esc(p)+'">'+esc(p)+'</span><select class="f pfam" data-p="'+esc(p)+'">'+opts+'</select><button class="btn ghost pdel" type="button" data-p="'+esc(p)+'">✕</button></div>';
      });
      h+='<button class="btn ghost" id="addprod" type="button" style="margin-top:10px">+ Ajouter un produit</button>';

      h+='</section>';
      app.innerHTML=h;

      bindBack(function(){ state.view="list"; render(); });
      setNav(null, true);
      var af=document.getElementById("addfam"); if(af) af.onclick=addFamille;
      var ac=document.getElementById("addcat"); if(ac) ac.onclick=addCat;
      [].forEach.call(document.querySelectorAll(".catren"), function(b){ b.onclick=function(){ renameCat(b.getAttribute("data-cat")); }; });
      [].forEach.call(document.querySelectorAll(".catdel"), function(b){ if(!b.disabled) b.onclick=function(){ var c=b.getAttribute("data-cat"); if(window.confirm("Supprimer « "+c+" » ? Les tickets de cette catégorie passeront dans Autre.")) deleteCat(c); }; });
      var ap=document.getElementById("addprod"); if(ap) ap.onclick=addProduct;
      [].forEach.call(document.querySelectorAll(".pren"), function(b){ b.onclick=function(){ renameFamille(b.getAttribute("data-fam")); }; });
      [].forEach.call(document.querySelectorAll(".pdelfam"), function(b){ if(!b.disabled) b.onclick=function(){ var f=b.getAttribute("data-fam"); if(window.confirm("Supprimer « "+f+" » ? Ses produits passeront dans Divers.")) deleteFamille(f); }; });
      [].forEach.call(document.querySelectorAll(".pedit"), function(sp){ sp.onclick=function(){ renameProduct(sp.getAttribute("data-p")); }; });
      [].forEach.call(document.querySelectorAll(".pfam"), function(sel){ sel.onchange=function(){ FAMILLE_DE[sel.getAttribute("data-p")]=sel.value; persistFamille(); }; });
      [].forEach.call(document.querySelectorAll(".pdel"), function(b){ b.onclick=function(){ var p=b.getAttribute("data-p"); if(!window.confirm("Supprimer le produit « "+p+" » ?")) return; var i=PRODUITS.indexOf(p); if(i>=0){ PRODUITS.splice(i,1); persistProd(); } if(p in FAMILLE_DE){ delete FAMILLE_DE[p]; persistFamille(); } render(); }; });
    }

    function makeCanvas(srcImg, w0, h0){
      var longest=Math.max(w0,h0), scale=1;
      if(w0<1600) scale=1600/w0;
      if(longest*scale>2000) scale=2000/longest;
      var w=Math.max(1,Math.round(w0*scale)), h=Math.max(1,Math.round(h0*scale));
      var c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(srcImg,0,0,w,h);
      return c;
    }
    function enhance(c){
      try{
        var ctx=c.getContext("2d"), d=ctx.getImageData(0,0,c.width,c.height), p=d.data, i, g, min=255, max=0;
        var lum=new Uint8ClampedArray(c.width*c.height);
        for(i=0;i<p.length;i+=4){ g=(p[i]*0.299+p[i+1]*0.587+p[i+2]*0.114)|0; lum[i>>2]=g; if(g<min)min=g; if(g>max)max=g; }
        var range=(max-min)||1;
        for(i=0;i<p.length;i+=4){ var v=(lum[i>>2]-min)*255/range; v=(v-128)*1.4+128; if(v<0)v=0; else if(v>255)v=255; p[i]=p[i+1]=p[i+2]=v; }
        ctx.putImageData(d,0,0);
      }catch(e){}
      return c;
    }
    function preprocess(file){
      return new Promise(function(resolve){
        function viaImg(){
          try{
            var img=new Image();
            img.onload=function(){ try{ resolve(enhance(makeCanvas(img,img.width,img.height))); }catch(e){ resolve(file); } };
            img.onerror=function(){ resolve(file); };
            img.src=URL.createObjectURL(file);
          }catch(e){ resolve(file); }
        }
        try{
          if(self.createImageBitmap){
            createImageBitmap(file).then(function(bmp){
              try{ var c=makeCanvas(bmp,bmp.width,bmp.height); try{ bmp.close(); }catch(e){} resolve(enhance(c)); }
              catch(e){ viaImg(); }
            }).catch(viaImg);
          } else viaImg();
        }catch(e){ viaImg(); }
      });
    }

    function canvasToBlob(src){
      return new Promise(function(resolve){
        function compress(canvas){
          var quals=[0.7,0.55,0.42,0.32,0.25], steps=0;
          (function attempt(qi){
            steps++;
            if(qi>=quals.length){
              if(canvas.width<=900 || steps>16){ canvas.toBlob(function(b){ resolve(b||src); }, "image/jpeg", 0.4); return; }
              var nc=document.createElement("canvas");
              nc.width=Math.max(1,Math.round(canvas.width*0.8));
              nc.height=Math.max(1,Math.round(canvas.height*0.8));
              nc.getContext("2d").drawImage(canvas,0,0,nc.width,nc.height);
              canvas=nc; attempt(0); return;
            }
            canvas.toBlob(function(b){
              if(!b){ resolve(src); return; }
              if(b.size<=950000){ resolve(b); return; }
              attempt(qi+1);
            }, "image/jpeg", quals[qi]);
          })(0);
        }
        if(src && src.toBlob){ compress(src); return; }
        function smallFrom(srcImg, w0, h0){ var lo=Math.max(w0,h0), s=lo>2000?2000/lo:1; var c=document.createElement("canvas"); c.width=Math.max(1,Math.round(w0*s)); c.height=Math.max(1,Math.round(h0*s)); c.getContext("2d").drawImage(srcImg,0,0,c.width,c.height); return c; }
        function viaImg(){ try{ var img=new Image(); img.onload=function(){ try{ compress(smallFrom(img,img.width,img.height)); }catch(e){ resolve(src); } }; img.onerror=function(){ resolve(src); }; img.src=URL.createObjectURL(src); }catch(e){ resolve(src); } }
        try{
          if(self.createImageBitmap){ createImageBitmap(src).then(function(bmp){ try{ var c=smallFrom(bmp,bmp.width,bmp.height); try{ bmp.close(); }catch(e){} compress(c); }catch(e){ viaImg(); } }).catch(viaImg); }
          else viaImg();
        }catch(e){ viaImg(); }
      });
    }
    function ocrCloud(blob){
      var key=store.read("ocrKey","");
      if(!key) return Promise.reject(new Error("pas de cle"));
      var fd=new FormData();
      fd.append("apikey", key); fd.append("language","fre"); fd.append("OCREngine","2");
      fd.append("isTable","true"); fd.append("scale","true");
      fd.append("file", blob, "ticket.jpg");
      return fetch("https://api.ocr.space/parse/image",{ method:"POST", body:fd })
        .then(function(r){ return r.json(); })
        .then(function(j){
          if(j.IsErroredOnProcessing) throw new Error((j.ErrorMessage&&j.ErrorMessage[0])||"erreur OCR cloud");
          return (j.ParsedResults&&j.ParsedResults[0]&&j.ParsedResults[0].ParsedText)||"";
        });
    }

    filein.onchange=function(ev){
      var files=ev.target.files ? [].slice.call(ev.target.files) : []; ev.target.value="";
      if(!files.length) return;
      state.busy=true; state.prog=0; state.note="";
      state.scanMsg = files.length>1 ? ("Lecture 1/"+files.length+"…") : "Lecture du ticket en cours…";
      state.draft={id:null,montant:"",date:todayISO(),marchand:"",categorie:"Autre",articles:[],payePar:""};
      state.view="form"; render();
      function tessText(src){ return Tesseract.recognize(src, "fra+eng", { logger:function(m){
          if(m.status==="recognizing text"){ state.prog=Math.round(m.progress*100); var bar=document.getElementById("bar"); if(bar) bar.style.width=state.prog+"%"; }
        }}).then(function(r){ return (r.data&&r.data.text)||""; }); }
      var diag=[];
      function localOne(src){ return (typeof Tesseract==="undefined") ? Promise.resolve("") : tessText(src).then(function(t){ diag.push("local:"+(t||"").length); return t; }); }
      function ocrOne(file){
        return preprocess(file).then(function(src){
          if(!(src && src.toBlob)) diag.push("preproc-KO");
          if(store.read("ocrKey","")){
            return canvasToBlob(src).then(function(blob){
              var ko = (blob && blob.size) ? Math.round(blob.size/1024) : "?";
              return ocrCloud(blob).then(function(t){ diag.push("cloud "+ko+"Ko:"+(t||"").length+"car"); return t; });
            }).catch(function(e){ diag.push("cloud KO("+((e&&e.message)||e)+")"); return localOne(src); });
          }
          return localOne(src);
        });
      }
      var texts=[], idx=0;
      function step(){
        if(idx>=files.length){
          var p=parseTicket(texts.join("\n"));
          state.draft.montant = (p.total==="")?"":String(p.total).replace(".",",");
          state.draft.date = p.date || state.draft.date;
          state.draft.marchand = p.marchand || state.draft.marchand;
          state.draft.categorie = p.categorie;
          state.draft.articles = (p.lignes||[]).map(function(a){ return {label:a.label, prix:a.prix, produit:lookupAppris(a.label)}; });
          var hasData = state.draft.montant || (state.draft.articles && state.draft.articles.length);
          state.note = hasData ? "" : ("Lecture vide ["+diag.join(" · ")+"]. Réessaie avec une photo plus nette, ou recadrée sur le ticket.");
          state.busy=false; state.scanMsg=""; render(); return;
        }
        if(files.length>1){ var sm=document.getElementById("scanmsg"); if(sm) sm.textContent="Lecture "+(idx+1)+"/"+files.length+"…"; state.prog=0; var bar=document.getElementById("bar"); if(bar) bar.style.width="0%"; }
        ocrOne(files[idx]).then(function(t){ texts.push(t||""); idx++; step(); })
          .catch(function(e){ console.warn("OCR indisponible:", e); texts.push(""); idx++; step(); });
      }
      step();
    };

    function backupData(){
      var keys=["entries","cats","familles","produits","familleDe","appris","fraisCommuns","argentMois","ocrKey","offlineReady"];
      var dump={ _app:"tickets", _version:1, _date:new Date().toISOString(), data:{} };
      keys.forEach(function(k){ var v=store.read(k, null); if(v!==null) dump.data[k]=v; });
      try{
        var blob=new Blob([JSON.stringify(dump)], {type:"application/json"});
        var url=URL.createObjectURL(blob);
        var a=document.createElement("a");
        a.href=url; a.download="tickets-sauvegarde-"+todayISO()+".json";
        document.body.appendChild(a); a.click();
        setTimeout(function(){ try{ document.body.removeChild(a); }catch(e){} URL.revokeObjectURL(url); }, 1500);
      }catch(e){ window.alert("Sauvegarde impossible : "+((e&&e.message)||e)); }
    }
    function restoreData(file){
      var r=new FileReader();
      r.onload=function(){
        try{
          var obj=JSON.parse(r.result);
          var data=(obj && obj.data && typeof obj.data==="object") ? obj.data : obj;
          if(!data || typeof data!=="object") throw new Error("format non reconnu");
          var n=(data.entries && data.entries.length) ? data.entries.length : 0;
          if(!window.confirm("Restaurer cette sauvegarde ?\n"+n+" ticket(s) vont REMPLACER les données actuelles.")) return;
          ["entries","cats","familles","produits","familleDe","appris","fraisCommuns","argentMois","ocrKey","offlineReady"].forEach(function(k){
            if(k in data) store.write(k, data[k]);
          });
          window.alert("Sauvegarde restaurée ✓");
          window.location.reload();
        }catch(e){ window.alert("Fichier invalide : "+((e&&e.message)||e)); }
      };
      r.onerror=function(){ window.alert("Lecture du fichier impossible."); };
      r.readAsText(file);
    }
    restorein.onchange=function(ev){ var f=ev.target.files && ev.target.files[0]; if(ev.target) ev.target.value=""; if(f) restoreData(f); };

    function prepareOffline(){
      if(typeof Tesseract==="undefined"){ state.offline="error"; render(); return; }
      state.offline="loading"; render();
      Tesseract.createWorker("fra+eng")
        .then(function(w){ return w.terminate(); })
        .then(function(){ store.write("offlineReady", true); state.offline="ready"; render(); })
        .catch(function(err){ console.warn(err); state.offline="error"; render(); });
    }

    render();

    if("serviceWorker" in navigator){
      window.addEventListener("load", function(){ navigator.serviceWorker.register("./sw.js").catch(function(){}); });
    }
  })();
  </script>
