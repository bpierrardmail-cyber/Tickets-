<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1b1a17" />
  <title>Tickets — Suivi des dépenses</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    :root{
      --surface:#cfccc2; --paper:#faf7ef; --paper-shade:#efe9db;
      --ink:#1b1a17; --ink-soft:#6f6a5e; --accent:#b23a2e; --line:#d9d3c4;
      --mono: ui-monospace, "SFMono-Regular", "Roboto Mono", Menlo, Consolas, monospace;
    }
    *{ box-sizing:border-box; }
    html,body{ margin:0; }
    body{ background:var(--surface); color:var(--ink); font-family:var(--mono);
      -webkit-font-smoothing:antialiased; padding:env(safe-area-inset-top) 0 0; }
    .app{ max-width:520px; margin:0 auto; padding:18px 14px 130px; }
    .head{ text-align:center; padding:14px 0 6px; letter-spacing:.18em; text-transform:uppercase; }
    .head h1{ font-size:14px; margin:0 0 4px; font-weight:700; }
    .head .sub{ font-size:10px; color:var(--ink-soft); letter-spacing:.22em; }
    .rule{ border:0; border-top:1px dashed var(--ink-soft); margin:12px 0; opacity:.6; }
    .paper{ position:relative; background:var(--paper); padding:18px 16px;
      box-shadow:0 1px 0 rgba(0,0,0,.04), 0 10px 24px rgba(0,0,0,.10); }
    .paper.torn::after{ content:""; position:absolute; bottom:-9px; left:0; width:100%; height:10px;
      background:
        linear-gradient(45deg, transparent 33%, var(--paper) 33%, var(--paper) 67%, transparent 67%),
        linear-gradient(-45deg, transparent 33%, var(--paper) 33%, var(--paper) 67%, transparent 67%);
      background-size:14px 18px; }
    .leader{ display:flex; align-items:baseline; gap:.4em; font-size:13px; padding:3px 0; }
    .leader .lbl{ white-space:nowrap; }
    .leader .fill{ flex:1; border-bottom:1px dotted var(--ink-soft); transform:translateY(-3px); opacity:.7; }
    .leader .val{ white-space:nowrap; font-variant-numeric:tabular-nums; }
    .total .lbl{ font-weight:700; letter-spacing:.05em; text-transform:uppercase; }
    .total .val{ font-size:22px; font-weight:700; color:var(--accent); }
    .muted{ color:var(--ink-soft); }
    .center{ text-align:center; }
    .entry{ padding:11px 4px; border-bottom:1px dashed var(--line); }
    .entry .row1{ display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
    .entry .name{ font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .entry .amt{ font-variant-numeric:tabular-nums; font-weight:700; white-space:nowrap; }
    .entry .row2{ display:flex; justify-content:space-between; font-size:11px; color:var(--ink-soft); margin-top:2px; }
    .cat{ display:inline-block; border:1px solid var(--ink-soft); padding:1px 7px; font-size:10px;
      text-transform:uppercase; letter-spacing:.06em; }
    button{ font-family:var(--mono); cursor:pointer; }
    .fab{ position:fixed; left:50%; transform:translateX(-50%); bottom:22px;
      background:var(--ink); color:var(--paper); border:none; padding:14px 26px;
      font-size:14px; letter-spacing:.08em; text-transform:uppercase; font-weight:700;
      border-radius:2px; box-shadow:0 8px 20px rgba(0,0,0,.28); }
    .fab:active{ transform:translateX(-50%) translateY(1px); }
    .btn{ background:none; border:1px solid var(--ink); color:var(--ink); padding:10px 14px;
      text-transform:uppercase; letter-spacing:.06em; font-size:12px; }
    .btn.primary{ background:var(--ink); color:var(--paper); }
    .btn.ghost{ border-color:var(--line); color:var(--ink-soft); }
    .btns{ display:flex; gap:10px; margin-top:16px; }
    .btns .btn{ flex:1; }
    label.f{ display:block; font-size:11px; text-transform:uppercase; letter-spacing:.08em;
      color:var(--ink-soft); margin:14px 0 5px; }
    input.f, select.f{ width:100%; font-family:var(--mono); font-size:16px; padding:10px 8px;
      border:none; border-bottom:1px solid var(--ink); background:var(--paper-shade); color:var(--ink); }
    input.f:focus, select.f:focus{ outline:2px solid var(--accent); outline-offset:1px; }
    .chips{ display:flex; flex-wrap:wrap; gap:8px; }
    .chip{ border:1px solid var(--ink-soft); background:none; color:var(--ink); padding:7px 11px;
      font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
    .chip.on{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
    .scanbox{ text-align:center; padding:22px 12px; border:1px dashed var(--ink-soft); margin-bottom:6px; }
    .progress{ height:6px; background:var(--paper-shade); margin-top:14px; overflow:hidden; }
    .progress > i{ display:block; height:100%; background:var(--accent); transition:width .2s; }
    .empty{ text-align:center; color:var(--ink-soft); padding:30px 10px; font-size:13px; line-height:1.6; }
    .offline-bar{ text-align:center; margin:20px 0 6px; font-size:12px; letter-spacing:.06em; }
    .barcode{ height:26px; margin:8px auto 0; width:60%;
      background:repeating-linear-gradient(90deg,var(--ink) 0 1px,transparent 1px 3px,var(--ink) 3px 4px,transparent 4px 7px); }
    .art{ margin:10px 0; padding:8px; background:var(--paper-shade); border-left:3px solid var(--line); }
    .art .art-name{ background:var(--paper); font-size:14px; }
    .art-row{ display:flex; gap:6px; align-items:center; margin-top:5px; }
    .art-row .art-prix{ flex:0 0 84px; }
    .art-row .art-prod{ flex:1; font-size:13px; }
    .art-row .art-del{ flex:0 0 auto; padding:8px 11px; }
    .leader.fam{ margin-top:8px; }
    .leader.fam .lbl{ font-weight:700; text-transform:uppercase; letter-spacing:.05em; }
    .leader.fam .val{ font-weight:700; color:var(--accent); }
    .leader.item{ font-size:12px; padding-left:16px; }
    .leader.item .lbl, .leader.item .val{ color:var(--ink-soft); }
    .prow{ display:flex; gap:8px; align-items:center; padding:8px 4px; border-bottom:1px dashed var(--line); }
    .prow .pname{ flex:1; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .prow .pfam{ flex:0 0 148px; font-size:13px; }
    .prow .pdel{ flex:0 0 auto; padding:6px 9px; }
    .prow .pren{ flex:0 0 auto; padding:6px 9px; }
    .prow .pdelfam{ flex:0 0 auto; padding:6px 9px; }
    .pname.pedit{ text-decoration:underline dotted; text-underline-offset:3px; }
    .bar-row{ margin:12px 2px; }
    .bar-top{ display:flex; justify-content:space-between; align-items:baseline; font-size:12px; margin-bottom:4px; }
    .bar-top .bl{ text-transform:uppercase; letter-spacing:.04em; }
    .bar-top .bv{ font-variant-numeric:tabular-nums; font-weight:700; }
    .bar-track{ height:16px; background:var(--paper-shade); border:1px solid var(--line); overflow:hidden; }
    .bar-track > i{ display:block; height:100%; background:var(--accent); }
    .checkrow{ display:flex; align-items:center; gap:10px; padding:9px 2px; font-size:13px; border-bottom:1px dashed var(--line); }
    .checkrow input{ width:18px; height:18px; accent-color:var(--accent); flex:0 0 auto; }
    .checkrow .ctot{ margin-left:auto; font-variant-numeric:tabular-nums; font-weight:700; color:var(--ink-soft); }
    .graph-block{ margin-top:18px; }
    .graph-block .gtitle{ font-weight:700; text-transform:uppercase; letter-spacing:.05em; font-size:12px; color:var(--accent); margin:6px 0 8px; }
    @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
  </style>
</head>
<body>
  <div id="app" class="app"></div>
  <input id="filein" type="file" accept="image/*" multiple style="display:none" />

  <script>
  (function(){
    "use strict";
    var mem = {};
    var store = {
      read: function(k, def){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):def; }catch(e){ return (k in mem)?mem[k]:def; } },
      write: function(k, val){ try{ localStorage.setItem(k, JSON.stringify(val)); }catch(e){ mem[k]=val; } }
    };

    var CATS = ["Alimentation","Restaurant","Carburant","Maison","Santé","Transport","Loisirs","Autre"];
    var KEYWORDS = {
      "Alimentation":["carrefour","leclerc","lidl","aldi","intermarch","super u","hyper u","casino","monoprix","auchan","netto","cora","biocoop","grand frais","franprix"],
      "Carburant":["total","esso"," bp ","station","avia","agip","gasoil","sp95","sp98","carburant"],
      "Restaurant":["restaurant","mcdo","mcdonald","burger","kebab","pizz","boulang","cafe","brasserie"],
      "Maison":["leroy merlin","castorama","brico","weldom","mr bricolage","point p","gedimat","ikea"],
      "Santé":["pharmacie","parapharm","optique","mutuelle"],
      "Transport":["sncf","peage","autoroute","parking","ratp"],
      "Loisirs":["fnac","decathlon","cultura","micromania"]
    };
    var FAMILLES = store.read("familles", null) || ["Nourriture","Boissons","Vêtements","Divers"];
    if(FAMILLES.indexOf("Divers")<0) FAMILLES.push("Divers");
    function persistFamilles(){ store.write("familles", FAMILLES); }
    var DEFAULT_PROD = FAMILLES.concat(["Tomates","Yaourts","Pain","Lait","Œufs","Fromage","Pâtes","Riz","Café","Fruits","Légumes","Viande","Éponges","Lessive","Produits ménagers"]);
    var PRODUITS = store.read("produits", null) || DEFAULT_PROD.slice();
    (function(){ var miss=FAMILLES.filter(function(f){ return PRODUITS.indexOf(f)<0; }); if(miss.length) PRODUITS = miss.concat(PRODUITS); })();
    if(PRODUITS.indexOf("Remise")<0) PRODUITS.push("Remise");
    function persistProd(){ store.write("produits", PRODUITS); }

    var APPRIS = store.read("appris", {});
    function persistAppris(){ store.write("appris", APPRIS); }
    function norm(s){ return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z ]/g," ").replace(/\s+/g," ").trim(); }
    function lookupAppris(label){
      var n=norm(label); if(!n) return "";
      if(APPRIS[n]) return APPRIS[n];
      var best="", bestKey="";
      for(var k in APPRIS){ if(k.length>=3 && (n.indexOf(k)>=0 || k.indexOf(n)>=0) && k.length>bestKey.length){ bestKey=k; best=APPRIS[k]; } }
      return best;
    }

    var DEFAULT_FAMILLE_DE = { "Tomates":"Nourriture","Yaourts":"Nourriture","Pain":"Nourriture","Lait":"Nourriture","Œufs":"Nourriture","Fromage":"Nourriture","Pâtes":"Nourriture","Riz":"Nourriture","Café":"Boissons","Fruits":"Nourriture","Légumes":"Nourriture","Viande":"Nourriture","Éponges":"Divers","Lessive":"Divers","Produits ménagers":"Divers","Remise":"Divers" };
    var FAMILLE_DE = store.read("familleDe", null) || {};
    (function(){ for(var k in DEFAULT_FAMILLE_DE){ if(!(k in FAMILLE_DE)) FAMILLE_DE[k]=DEFAULT_FAMILLE_DE[k]; } FAMILLES.forEach(function(f){ FAMILLE_DE[f]=f; }); })();
    function persistFamille(){ store.write("familleDe", FAMILLE_DE); }
    function familleOf(p){ return FAMILLE_DE[p] || "Divers"; }
    function classifyArticle(a){
      var amt=Number(a.prix)||0, prod=a.produit||"", fam, name;
      if(prod && FAMILLES.indexOf(prod)<0){ fam=familleOf(prod); name=prod; }
      else { fam=(prod && FAMILLES.indexOf(prod)>=0)?prod:"Divers"; name=(a.label||"").trim()||"Autres"; }
      return { fam:fam, name:name, amt:amt };
    }

    function guessCat(text){
      var t=(text||"").toLowerCase();
      for(var i=0;i<CATS.length;i++){ var c=CATS[i], kws=KEYWORDS[c]||[]; for(var j=0;j<kws.length;j++){ if(t.indexOf(kws[j])>=0) return c; } }
      return "Autre";
    }

    function parseTicket(text){
      var lines = text.split(/\n/).map(function(l){return l.trim();}).filter(Boolean);
      var amtRe = /(\d{1,4})[.,](\d{2})\b/g;
      var key = /total|a payer|à payer|net a|net à|montant|carte|especes|espèces|rendu|tva/i;
      var all = [], lignes = [];
      lines.forEach(function(l){
        var m, last=null; amtRe.lastIndex=0;
        while((m=amtRe.exec(l))){ all.push({ value: parseFloat(m[1]+"."+m[2]), line:l }); last=m; }
        if(key.test(l) || !last) return;
        var prix = parseFloat(last[1]+"."+last[2]);
        var label = l.replace(/(\d{1,4})[.,](\d{2})\b/g," ").replace(/[^0-9A-Za-zÀ-ÿ ]+/g," ").replace(/\s+/g," ").trim();
        if(label.length < 2) return;
        lignes.push({ label: label.slice(0,28), prix: String(prix).replace(".",","), produit:"" });
      });
      var flagged = all.filter(function(a){ return /total|a payer|à payer|net a|net à|montant/i.test(a.line); });
      var total = "";
      if(flagged.length) total = Math.max.apply(null, flagged.map(function(a){return a.value;}));
      else if(all.length) total = Math.max.apply(null, all.map(function(a){return a.value;}));
      var date="";
      var dm = text.match(/\b(\d{2})[\/.\-](\d{2})[\/.\-](\d{2,4})\b/);
      if(dm){ var y=dm[3].length===2?"20"+dm[3]:dm[3]; date=y+"-"+dm[2]+"-"+dm[1]; }
      var marchand="";
      for(var i=0;i<lines.length;i++){ if(/[A-Za-zÀ-ÿ]{3,}/.test(lines[i])){ marchand=lines[i].slice(0,32); break; } }
      return { total: total, date: date, marchand: marchand, categorie: guessCat(text), lignes: lignes };
    }

    function todayISO(){ return new Date().toISOString().slice(0,10); }
    function fmt(n){ return (Number(n)||0).toFixed(2).replace(".",",")+" €"; }
    function monthKey(iso){ return (iso||todayISO()).slice(0,7); }
    function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]; }); }
    function num(x){ return parseFloat(String(x).replace(",","."))||0; }

    var state = {
      entries: store.read("entries", []),
      view: "list", draft: null,
      offline: store.read("offlineReady", false) ? "ready" : "idle",
      busy: false, prog: 0, scanMsg: "", note: "", graphSel: null
    };
    function persist(){ store.write("entries", state.entries); }

    var app = document.getElementById("app");
    var filein = document.getElementById("filein");

    function header(){
      return '<header class="head"><h1>Tickets — Dépenses</h1>'+
             '<div class="sub">suivi local · sans compte</div><div class="barcode"></div></header>';
    }

    function render(){
      if(state.view==="form") return renderForm();
      if(state.view==="articles") return renderArticles();
      if(state.view==="produits") return renderProduits();
      if(state.view==="graph") return renderGraph();
      return renderList();
    }

    function renderList(){
      var month = monthKey(todayISO());
      var mois = state.entries.filter(function(e){ return monthKey(e.date)===month; });
      var totalMois = mois.reduce(function(s,e){ return s+(Number(e.montant)||0); }, 0);
      var parCat = {};
      mois.forEach(function(e){ parCat[e.categorie]=(parCat[e.categorie]||0)+(Number(e.montant)||0); });
      var cats = Object.keys(parCat).sort(function(a,b){ return parCat[b]-parCat[a]; });
      var monthLabel = new Date().toLocaleDateString("fr-FR",{month:"long",year:"numeric"});

      var h = header();
      h += '<section class="paper torn">';
      h += '<div class="center muted" style="font-size:11px;letter-spacing:.18em;text-transform:uppercase">'+esc(monthLabel)+'</div>';
      h += '<hr class="rule">';
      if(cats.length===0) h += '<div class="center muted" style="font-size:12px">Aucune dépense ce mois-ci</div>';
      cats.forEach(function(c){
        h += '<div class="leader"><span class="lbl">'+esc(c)+'</span><span class="fill"></span><span class="val">'+fmt(parCat[c])+'</span></div>';
      });
      h += '<hr class="rule"><div class="leader total"><span class="lbl">Total</span><span class="fill"></span><span class="val">'+fmt(totalMois)+'</span></div>';
      h += '</section>';

      h += '<div class="center" style="margin:14px 0"><button class="btn" id="goarts">Articles du mois →</button></div>';
      h += '<div class="center" style="margin:0 0 14px"><button class="btn" id="goprod">Produits et catégories →</button></div>';
      h += '<div class="center" style="margin:0 0 14px"><button class="btn" id="gograph">Graphiques produits →</button></div>';
      h += '<hr class="rule">';

      if(state.entries.length===0){
        h += '<div class="empty">Rien d\'enregistré pour l\'instant.<br>Appuie sur <b>Scanner un ticket</b> en bas pour commencer.</div>';
      } else {
        state.entries.forEach(function(e){
          h += '<div class="entry" data-id="'+esc(e.id)+'">'+
                 '<div class="row1"><span class="name">'+esc(e.marchand)+'</span><span class="amt">'+fmt(e.montant)+'</span></div>'+
                 '<div class="row2"><span class="cat">'+esc(e.categorie)+'</span><span>'+esc((e.date||"").split("-").reverse().join("/"))+'</span></div>'+
               '</div>';
        });
      }

      h += '<div class="offline-bar">' + (state.offline==="ready"
          ? '<span class="muted">OCR hors-ligne prêt</span>'
          : '<button class="btn ghost" id="prep"'+(state.offline==="loading"?" disabled":"")+'>'+
              (state.offline==="loading"?"Téléchargement…":state.offline==="error"?"Échec — réessayer":"Préparer le mode hors-ligne")+
            '</button>') + '</div>';

      h += '<div class="center" style="margin:2px 0 0;font-size:11px"><button class="btn ghost" id="cloudkey">'+(store.read("ocrKey","")?"OCR cloud activé ✓":"Activer OCR cloud (clé)")+'</button></div>';

      h += '<button class="fab" id="manual" style="bottom:78px;background:transparent;color:var(--ink);box-shadow:none;border:1px solid var(--ink)">Saisie manuelle</button>';
      h += '<button class="fab" id="scan">Scanner un ticket</button>';

      app.innerHTML = h;

      var scan=document.getElementById("scan"); if(scan) scan.onclick=function(){ filein.click(); };
      var manual=document.getElementById("manual"); if(manual) manual.onclick=newDraft;
      var prep=document.getElementById("prep"); if(prep) prep.onclick=prepareOffline;
      var ck=document.getElementById("cloudkey"); if(ck) ck.onclick=function(){ var cur=store.read("ocrKey",""); var k=window.prompt("Colle ta clé API OCR.space (vide = désactiver) :", cur); if(k===null) return; store.write("ocrKey", k.trim()); render(); };
      var goarts=document.getElementById("goarts"); if(goarts) goarts.onclick=function(){ state.view="articles"; render(); };
      var goprod=document.getElementById("goprod"); if(goprod) goprod.onclick=function(){ state.view="produits"; render(); };
      var gograph=document.getElementById("gograph"); if(gograph) gograph.onclick=function(){ state.view="graph"; render(); };
      [].forEach.call(document.querySelectorAll(".entry"), function(node){
        node.onclick=function(){ editEntry(node.getAttribute("data-id")); };
      });
    }

    function artRow(a){
      var opts='<option value="">— non classé —</option>';
      PRODUITS.forEach(function(p){ opts+='<option value="'+esc(p)+'"'+(a.produit===p?" selected":"")+'>'+esc(p)+'</option>'; });
      opts+='<option value="__new">+ Nouveau produit…</option>';
      return '<div class="art">'+
        '<input class="f art-name" value="'+esc(a.label)+'" placeholder="Article">'+
        '<div class="art-row">'+
          '<input class="f art-prix" inputmode="decimal" value="'+esc(a.prix)+'" placeholder="0,00">'+
          '<select class="f art-prod">'+opts+'</select>'+
          '<button class="btn ghost art-del" type="button">✕</button>'+
        '</div></div>';
    }

    function renderForm(){
      var d = state.draft;
      var h = header() + '<section class="paper">';
      if(state.note){ h += '<div class="center" style="font-size:11px;color:var(--accent);margin-bottom:8px">'+esc(state.note)+'</div>'; }
      if(state.busy){
        h += '<div class="scanbox"><span id="scanmsg">'+esc(state.scanMsg||"Lecture du ticket en cours…")+'</span>'+
               '<div class="progress"><i id="bar" style="width:'+state.prog+'%"></i></div>'+
               '<div class="muted" style="font-size:11px;margin-top:8px">Tu peux déjà corriger les champs ci-dessous.</div></div>';
      }
      h += '<label class="f">Montant (€)</label><input class="f" id="f-montant" inputmode="decimal" value="'+esc(d.montant)+'" placeholder="0,00">';
      h += '<label class="f">Enseigne</label><input class="f" id="f-marchand" value="'+esc(d.marchand)+'" placeholder="Nom du magasin">';
      h += '<label class="f">Date</label><input class="f" id="f-date" type="date" value="'+esc(d.date)+'">';
      h += '<label class="f">Catégorie</label><div class="chips" id="chips">';
      CATS.forEach(function(c){ h += '<button class="chip'+(d.categorie===c?" on":"")+'" data-cat="'+esc(c)+'">'+esc(c)+'</button>'; });
      h += '</div>';
      h += '<label class="f">Articles (rangés par produit)</label><div id="arts">';
      (d.articles||[]).forEach(function(a){ h += artRow(a); });
      h += '</div><button class="btn ghost" id="addart" type="button" style="margin-top:10px">+ Ajouter un article</button>'+
           ' <button class="btn ghost" id="addremise" type="button" style="margin-top:10px">+ Remise / promo</button>';
      h += '<div class="btns"><button class="btn ghost" id="cancel" type="button">Annuler</button>'+
           (d.id?'<button class="btn" id="del" type="button">Supprimer</button>':'')+
           '<button class="btn primary" id="save" type="button">Enregistrer</button></div></section>';
      app.innerHTML = h;

      document.getElementById("cancel").onclick=function(){ state.view="list"; state.draft=null; render(); };
      var del=document.getElementById("del"); if(del) del.onclick=delDraft;
      document.getElementById("save").onclick=saveDraft;
      document.getElementById("addart").onclick=function(){ readForm(); state.draft.articles.push({label:"",prix:"",produit:""}); render(); };
      var addr=document.getElementById("addremise"); if(addr) addr.onclick=function(){ readForm(); state.draft.articles.push({label:"Remise",prix:"",produit:"Remise"}); render(); };
      [].forEach.call(document.querySelectorAll("#chips .chip"), function(btn){
        btn.onclick=function(){
          state.draft.categorie=btn.getAttribute("data-cat");
          [].forEach.call(document.querySelectorAll("#chips .chip"), function(b){ b.classList.remove("on"); });
          btn.classList.add("on");
        };
      });
      [].forEach.call(document.querySelectorAll(".art-del"), function(b,i){
        b.onclick=function(){ readForm(); state.draft.articles.splice(i,1); render(); };
      });
      [].forEach.call(document.querySelectorAll(".art-prod"), function(sel,i){
        sel.onchange=function(){
          if(sel.value==="__new"){
            var name=(window.prompt("Nom du nouveau produit :")||"").trim();
            readForm();
            if(name){
              if(PRODUITS.indexOf(name)<0){ PRODUITS.push(name); persistProd(); }
              if(!(name in FAMILLE_DE)){
                var fam=(window.prompt("Grande catégorie pour « "+name+" » ?\n("+FAMILLES.join(", ")+")","Divers")||"Divers").trim();
                FAMILLE_DE[name]= FAMILLES.indexOf(fam)>=0 ? fam : "Divers"; persistFamille();
              }
              if(state.draft.articles[i]) state.draft.articles[i].produit=name;
            }
            else if(state.draft.articles[i]) state.draft.articles[i].produit="";
            render();
          }
        };
      });
    }

    function readForm(){
      state.draft.montant=document.getElementById("f-montant").value;
      state.draft.marchand=document.getElementById("f-marchand").value;
      state.draft.date=document.getElementById("f-date").value;
      var arts=[];
      [].forEach.call(document.querySelectorAll("#arts .art"), function(node){
        arts.push({ label:node.querySelector(".art-name").value,
                    prix:node.querySelector(".art-prix").value,
                    produit:node.querySelector(".art-prod").value });
      });
      state.draft.articles=arts;
    }

    function newDraft(){ state.note=""; state.draft={id:null,montant:"",date:todayISO(),marchand:"",categorie:"Autre",articles:[]}; state.view="form"; render(); }
    function editEntry(id){
      var e=state.entries.filter(function(x){ return String(x.id)===String(id); })[0];
      if(!e) return;
      state.draft={id:e.id,montant:e.montant,date:e.date,marchand:e.marchand,categorie:e.categorie,
        articles:(e.articles||[]).map(function(a){ return {label:a.label,prix:a.prix,produit:a.produit}; })};
      state.view="form"; render();
    }
    function saveDraft(){
      readForm();
      var montant=num(state.draft.montant);
      if(!montant){ var f=document.getElementById("f-montant"); if(f) f.focus(); return; }
      var arts=(state.draft.articles||[]).map(function(a){
          var pr=num(a.prix), prod=(a.produit==="__new"?"":a.produit)||"";
          if(prod==="Remise") pr=-Math.abs(pr);
          return {label:(a.label||"").trim(), prix:pr, produit:prod};
        }).filter(function(a){ return a.label || a.produit || a.prix; });
      var entry={ id:state.draft.id, montant:montant, date:state.draft.date||todayISO(),
        marchand:(state.draft.marchand||"").trim()||"Sans nom", categorie:state.draft.categorie, articles:arts };
      arts.forEach(function(a){ if(a.produit && a.label){ APPRIS[norm(a.label)]=a.produit; } });
      persistAppris();
      if(entry.id){ state.entries=state.entries.map(function(e){ return String(e.id)===String(entry.id)?entry:e; }); }
      else { entry.id=Date.now(); state.entries.unshift(entry); }
      persist(); state.view="list"; state.draft=null; render();
    }
    function delDraft(){
      if(state.draft && state.draft.id){ state.entries=state.entries.filter(function(e){ return String(e.id)!==String(state.draft.id); }); persist(); }
      state.view="list"; state.draft=null; render();
    }

    function renderArticles(){
      var month = monthKey(todayISO());
      var monthLabel = new Date().toLocaleDateString("fr-FR",{month:"long",year:"numeric"});
      var fams={}, grand=0;
      state.entries.filter(function(e){ return monthKey(e.date)===month; }).forEach(function(e){
        (e.articles||[]).forEach(function(a){
          var c=classifyArticle(a);
          if(!fams[c.fam]) fams[c.fam]={total:0, items:{}};
          fams[c.fam].total+=c.amt; grand+=c.amt;
          if(!fams[c.fam].items[c.name]) fams[c.fam].items[c.name]={n:0,total:0};
          fams[c.fam].items[c.name].n++; fams[c.fam].items[c.name].total+=c.amt;
        });
      });
      var famKeys=Object.keys(fams).sort(function(a,b){ return fams[b].total-fams[a].total; });
      var h=header()+'<section class="paper torn">';
      h+='<div class="center muted" style="font-size:11px;letter-spacing:.18em;text-transform:uppercase">Articles · '+esc(monthLabel)+'</div><hr class="rule">';
      if(famKeys.length===0) h+='<div class="center muted" style="font-size:12px">Aucun article rangé ce mois-ci.<br>Scanne un ticket et classe ses lignes par produit.</div>';
      famKeys.forEach(function(f){
        h+='<div class="leader fam"><span class="lbl">'+esc(f)+'</span><span class="fill"></span><span class="val">'+fmt(fams[f].total)+'</span></div>';
        var names=Object.keys(fams[f].items).sort(function(a,b){ return fams[f].items[b].total-fams[f].items[a].total; });
        names.forEach(function(nm){
          var it=fams[f].items[nm];
          h+='<div class="leader item"><span class="lbl">'+esc(nm)+' ×'+it.n+'</span><span class="fill"></span><span class="val">'+fmt(it.total)+'</span></div>';
        });
      });
      if(famKeys.length) h+='<hr class="rule"><div class="leader total"><span class="lbl">Total articles</span><span class="fill"></span><span class="val">'+fmt(grand)+'</span></div>';
      h+='</section><div class="btns" style="margin-top:18px"><button class="btn" id="back" type="button">Retour</button></div>';
      app.innerHTML=h;
      document.getElementById("back").onclick=function(){ state.view="list"; render(); };
    }
