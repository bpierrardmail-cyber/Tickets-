<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#13151b" />
  <title>Tickets — Suivi des dépenses</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    :root{
      --bg:#13151b; --bg0:#0e0f14; --card:#1b1e26; --card2:#20242e;
      --line:rgba(255,255,255,.075); --line2:rgba(255,255,255,.13);
      --ink:#eceef3; --ink-soft:#9298a5; --muted:#656b78;
      --accent:#4fd6a0; --accent-dim:rgba(79,214,160,.14); --coral:#f4796b;
      --mono: ui-monospace, "SFMono-Regular", "Roboto Mono", Menlo, Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, system-ui, sans-serif;
    }
    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body{ margin:0; }
    body{ background:var(--bg0); color:var(--ink); font-family:var(--sans);
      -webkit-font-smoothing:antialiased; padding:env(safe-area-inset-top) 0 0; }
    .app{ max-width:480px; margin:0 auto; padding:10px 14px 112px; }
    /* nombres en chasse fixe */
    .total .val, .leader .val, .entry .amt, .lgd .lv, .lgd .lp, .bar-top .bv,
    .checkrow .ctot, .prow .pfam{ font-family:var(--mono); font-variant-numeric:tabular-nums; }
    /* En-tête */
    .head{ position:relative; text-align:center; padding:16px 0 10px; }
    .hback{ position:absolute; left:0; top:14px; background:var(--card2); border:1px solid var(--line);
      color:var(--ink-soft); font-family:var(--sans); font-size:13px; padding:7px 12px; border-radius:10px; }
    .head h1{ font-size:20px; margin:0; font-weight:700; letter-spacing:-.01em; color:var(--ink); }
    .head .sub{ font-size:10px; color:var(--muted); letter-spacing:.16em; text-transform:uppercase; margin-top:3px; }
    .barcode{ display:none; }
    .rule{ border:0; border-top:1px solid var(--line); margin:14px 0; }
    /* Carte principale */
    .paper{ position:relative; background:var(--card); padding:18px 16px; border-radius:20px;
      border:1px solid var(--line); box-shadow:0 12px 30px rgba(0,0,0,.35); }
    .paper.torn::after{ display:none; }
    /* Lignes à pointillés */
    .leader{ display:flex; align-items:baseline; gap:.5em; font-size:14px; padding:5px 0; }
    .leader .lbl{ white-space:nowrap; }
    .leader .fill{ flex:1; border-bottom:1px dotted var(--line2); transform:translateY(-3px); }
    .leader .val{ white-space:nowrap; font-weight:600; }
    .total{ padding:7px 0; }
    .total .lbl{ font-weight:700; letter-spacing:.02em; }
    .total .val{ font-size:24px; font-weight:700; color:var(--accent); }
    .muted{ color:var(--ink-soft); }
    .center{ text-align:center; }
    /* Tickets en cartes */
    .entry{ display:flex; flex-wrap:wrap; align-items:center; column-gap:13px; row-gap:0; background:var(--card); border:1px solid var(--line);
      border-radius:16px; padding:12px 14px; margin-bottom:10px; box-shadow:0 4px 14px rgba(0,0,0,.22); }
    .eic{ width:44px; height:44px; border-radius:13px; display:grid; place-items:center; font-size:20px; flex:0 0 auto; }
    .econ{ flex:1; min-width:0; }
    .entry .row1{ display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
    .entry .name{ flex:1; min-width:0; font-weight:600; font-size:15px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .entry .amt{ font-weight:600; font-size:16px; white-space:nowrap; }
    .entry .row2{ display:flex; justify-content:space-between; align-items:center; font-size:12px; color:var(--muted); margin-top:6px; gap:8px; }
    .entry .r2l{ display:flex; gap:6px; align-items:center; min-width:0; overflow:hidden; }
    .entry > .row1, .entry > .row2{ flex:0 0 100%; min-width:0; }
    .entry .row2 > span:first-child{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
    .entry .row2 > span:last-child{ flex:0 0 auto; }
    .cat{ display:inline-block; background:var(--card2); color:var(--ink-soft); padding:3px 9px; font-size:11px;
      letter-spacing:.02em; border-radius:999px; white-space:nowrap; }
    .cat.pay{ background:var(--accent-dim); color:var(--accent); }
    button{ font-family:var(--sans); cursor:pointer; }
    .fab{ position:fixed; left:50%; transform:translateX(-50%); bottom:22px;
      background:var(--accent); color:#0a130f; border:none; padding:14px 26px;
      font-size:14px; letter-spacing:.04em; font-weight:700; border-radius:16px;
      box-shadow:0 10px 26px rgba(79,214,160,.4); }
    .fab:active{ transform:translateX(-50%) translateY(1px); }
    .btn{ background:var(--card2); border:1px solid var(--line); color:var(--ink); padding:11px 15px;
      letter-spacing:.01em; font-size:13px; border-radius:12px; font-weight:500; }
    .btn.primary{ background:var(--accent); color:#0a130f; border-color:var(--accent); font-weight:700; }
    .btn.ghost{ background:var(--card2); border-color:var(--line); color:var(--ink-soft); }
    .btns{ display:flex; gap:10px; margin-top:16px; }
    .btns .btn{ flex:1; }
    label.f{ display:block; font-size:11px; text-transform:uppercase; letter-spacing:.06em;
      color:var(--ink-soft); margin:14px 0 6px; }
    input.f, select.f{ width:100%; font-family:var(--sans); font-size:16px; padding:12px 13px;
      border:1px solid var(--line); border-radius:12px; background:var(--card2); color:var(--ink); }
    input.f::placeholder{ color:var(--muted); }
    input.f:focus, select.f:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }
    .chips{ display:flex; flex-wrap:wrap; gap:8px; }
    .chip{ border:1px solid var(--line); background:var(--card2); color:var(--ink); padding:8px 13px;
      font-size:13px; letter-spacing:.01em; border-radius:999px; }
    .chip.on{ background:var(--accent); color:#0a130f; border-color:var(--accent); font-weight:600; }
    .scanbox{ text-align:center; padding:22px 12px; border:1px dashed var(--line2); border-radius:16px; margin-bottom:6px; background:var(--card2); }
    .progress{ height:8px; background:var(--card2); border-radius:999px; margin-top:14px; overflow:hidden; }
    .progress > i{ display:block; height:100%; background:var(--accent); transition:width .2s; }
    .empty{ text-align:center; color:var(--ink-soft); padding:30px 10px; font-size:14px; line-height:1.7; }
    .empty b{ color:var(--ink); }
    .offline-bar{ text-align:center; margin:20px 0 6px; font-size:12px; letter-spacing:.02em; }
    .art{ margin:10px 0; padding:12px; background:var(--card2); border:1px solid var(--line); border-left:3px solid var(--accent); border-radius:12px; }
    .art .art-name{ font-size:14px; }
    .art-row{ display:flex; gap:8px; align-items:center; margin-top:8px; }
    .art-row .art-prix{ flex:0 0 92px; }
    .art-row .art-prod{ flex:1; font-size:13px; }
    .art-row .art-del{ flex:0 0 auto; padding:10px 13px; }
    .art-com{ display:flex; align-items:center; gap:8px; margin-top:9px; font-size:13px; color:var(--ink-soft); }
    .art-com input{ width:19px; height:19px; accent-color:var(--accent); flex:0 0 auto; }
    .leader.fam{ margin-top:10px; }
    .leader.fam .lbl{ font-weight:700; letter-spacing:.01em; }
    .leader.fam .val{ font-weight:700; color:var(--accent); }
    .leader.item{ font-size:13px; padding-left:14px; }
    .leader.item .lbl, .leader.item .val{ color:var(--ink-soft); }
    .prow{ display:flex; gap:8px; align-items:center; padding:11px 2px; border-bottom:1px solid var(--line); }
    .prow .pname{ flex:1; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .prow .pfam{ flex:0 0 148px; font-size:13px; }
    .prow .pdel, .prow .pren, .prow .pdelfam, .prow .catren, .prow .catdel, .prow .fxedit, .prow .fxdel{ flex:0 0 auto; padding:8px 11px; }
    .pname.pedit{ text-decoration:underline dotted; text-underline-offset:3px; }
    .bar-row{ margin:14px 2px; }
    .bar-top{ display:flex; justify-content:space-between; align-items:baseline; font-size:13px; margin-bottom:6px; }
    .bar-top .bl{ letter-spacing:.01em; }
    .bar-top .bv{ font-weight:700; }
    .bar-track{ height:14px; background:var(--card2); border-radius:999px; overflow:hidden; }
    .bar-track > i{ display:block; height:100%; background:var(--accent); border-radius:999px; }
    .bar-row.clk{ cursor:pointer; }
    .leader.item.itemclk{ cursor:pointer; }
    .leader.item.itemclk .lbl{ text-decoration:underline dotted; text-underline-offset:3px; }
    .checkrow{ display:flex; align-items:center; gap:11px; padding:11px 2px; font-size:14px; border-bottom:1px solid var(--line); }
    .checkrow input{ width:19px; height:19px; accent-color:var(--accent); flex:0 0 auto; }
    .checkrow .ctot{ margin-left:auto; font-weight:700; color:var(--ink-soft); }
    .graph-block{ margin-top:18px; }
    .graph-block .gtitle{ font-weight:700; letter-spacing:.02em; font-size:13px; color:var(--accent); margin:6px 0 8px; }
    .seg{ display:flex; background:var(--card2); border-radius:13px; padding:4px; margin:14px 0 6px; gap:4px; }
    .seg button{ flex:1; background:none; border:none; padding:9px 4px; font-family:var(--sans); font-size:13px;
      letter-spacing:.01em; color:var(--ink-soft); border-radius:9px; font-weight:600; }
    .seg button.on{ background:var(--accent); color:#0a130f; }
    .lgd{ display:flex; align-items:center; gap:10px; width:100%; background:none; border:none; padding:11px 2px;
      border-bottom:1px solid var(--line); font-family:var(--sans); font-size:14px; color:var(--ink); text-align:left; }
    .lgd .sw{ width:12px; height:12px; flex:0 0 auto; border-radius:3px; }
    .lgd .ln{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .lgd .lv{ color:var(--ink-soft); font-weight:600; }
    .lgd .lp{ flex:0 0 44px; text-align:right; color:var(--muted); font-weight:600; }
    .lgd.off{ opacity:.4; }
    .lgd.off .ln{ text-decoration:line-through; }
    /* Barre du bas */
    .nav{ position:fixed; left:0; right:0; bottom:0; z-index:60; display:flex; flex-direction:column;
      background:rgba(20,22,29,.9); -webkit-backdrop-filter:blur(16px); backdrop-filter:blur(16px);
      border-top:1px solid var(--line); padding:0 6px calc(8px + env(safe-area-inset-bottom)); }
    .nav.hidden{ display:none; }
    .navscanrow{ display:flex; justify-content:center; }
    .navscanrow button{ background:var(--accent); color:#0a130f; border:4px solid var(--bg0); width:60px; height:60px;
      border-radius:50%; margin-top:-26px; box-shadow:0 10px 24px rgba(79,214,160,.45); font-family:var(--sans);
      font-size:11px; letter-spacing:.04em; font-weight:700; }
    .navscanrow button:active{ transform:translateY(1px); }
    .navtabs{ display:flex; padding-top:4px; }
    .navtabs .navi{ flex:1; background:none; border:none; color:var(--muted); font-family:var(--sans);
      font-size:10px; letter-spacing:.01em; font-weight:600; padding:4px 0 6px; position:relative; }
    .navtabs .navi.on{ color:var(--accent); }
    .navtabs .navi.on::before{ content:""; position:absolute; top:-2px; left:30%; right:30%; height:3px; background:var(--accent); border-radius:999px; }
    .lightbox{ position:fixed; inset:0; background:#000; z-index:100; display:flex; flex-direction:column; }
    .lbtop{ display:flex; align-items:center; gap:12px; padding:calc(10px + env(safe-area-inset-top)) 14px 10px; color:#fff; }
    .lbtop .lbx{ background:rgba(255,255,255,.14); border:none; color:#fff; width:40px; height:40px; border-radius:50%; font-size:22px; line-height:1; flex:0 0 auto; }
    .lbtop .lbcap{ min-width:0; }
    .lbtop .lbn{ font-weight:600; font-size:15px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .lbtop .lbm{ font-size:12px; color:#aab; }
    .lbimg{ flex:1; min-height:0; display:flex; align-items:center; justify-content:center; padding:4px 10px; }
    .lbimg img{ max-width:100%; max-height:100%; object-fit:contain; border-radius:8px; }
    .lbbtns{ display:flex; gap:10px; padding:12px 14px calc(14px + env(safe-area-inset-bottom)); }
    .lbbtns .btn{ flex:1; }
    .gallery{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:6px; }
    .gtile{ position:relative; border-radius:14px; overflow:hidden; border:1px solid var(--line); background:var(--card2); }
    .gimg{ width:100%; padding-top:125%; background-size:cover; background-position:center; cursor:pointer; }
    .gdel{ position:absolute; top:6px; right:6px; width:30px; height:30px; border-radius:50%; background:rgba(0,0,0,.55); color:#fff; border:none; font-size:13px; line-height:1; }
    .gcap{ position:absolute; left:0; right:0; bottom:0; display:flex; justify-content:space-between; gap:8px; align-items:flex-end; padding:16px 9px 7px; font-size:11px; background:linear-gradient(transparent, rgba(0,0,0,.8)); color:#fff; }
    .gcap .gn{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .gcap .ga{ font-family:var(--mono); font-weight:700; flex:0 0 auto; }
    .sheet-overlay{ position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:110; display:flex; align-items:flex-end; }
    .sheet{ width:100%; background:var(--card); border-top-left-radius:20px; border-top-right-radius:20px; border-top:1px solid var(--line);
      padding:16px 16px calc(20px + env(safe-area-inset-bottom)); display:flex; flex-direction:column; gap:10px; box-shadow:0 -10px 30px rgba(0,0,0,.45); }
    .sheet-title{ text-align:center; font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:4px; }
    .sheet .btn{ width:100%; padding:14px; font-size:15px; }
    @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
  </style>
</head>
<body>
  <div id="app" class="app"></div>
  <input id="filein" type="file" accept="image/*" multiple style="display:none" />
  <input id="restorein" type="file" accept="application/json,.json" style="display:none" />
  <input id="photoin" type="file" accept="image/*" style="display:none" />

  <script>
  (function(){
    "use strict";
    var mem = {};
    var storageFull=false;
    var store = {
      read: function(k, def){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):def; }catch(e){ return (k in mem)?mem[k]:def; } },
      write: function(k, val){ try{ localStorage.setItem(k, JSON.stringify(val)); storageFull=false; }catch(e){ mem[k]=val; storageFull=true; } }
    };

    var CATS = store.read("cats", null) || ["Alimentation","Restaurant","Carburant","Maison","Santé","Transport","Loisirs","Autre"];
    if(CATS.indexOf("Autre")<0) CATS.push("Autre");
    function persistCats(){ store.write("cats", CATS); }
    var KEYWORDS = {
      "Alimentation":["carrefour","leclerc","lidl","aldi","intermarch","super u","hyper u","casino","monoprix","auchan","netto","cora","biocoop","grand frais","franprix"],
      "Carburant":["total","esso"," bp ","station","avia","agip","gasoil","sp95","sp98","carburant"],
      "Restaurant":["restaurant","mcdo","mcdonald","burger","kebab","pizz","boulang","cafe","brasserie"],
      "Maison":["leroy merlin","castorama","brico","weldom","mr bricolage","point p","gedimat","ikea"],
      "Santé":["pharmacie","parapharm","optique","mutuelle"],
      "Transport":["sncf","peage","autoroute","parking","ratp"],
      "Loisirs":["fnac","decathlon","cultura","micromania"]
    };
    var FAMILLES = store.read("familles", null) || ["Nourriture","Boissons","Vêtements","Divers"];
    if(FAMILLES.indexOf("Divers")<0) FAMILLES.push("Divers");
    function persistFamilles(){ store.write("familles", FAMILLES); }
    var DEFAULT_PROD = FAMILLES.concat(["Tomates","Yaourts","Pain","Lait","Œufs","Fromage","Pâtes","Riz","Café","Fruits","Légumes","Viande","Éponges","Lessive","Produits ménagers"]);
    var PRODUITS = store.read("produits", null) || DEFAULT_PROD.slice();
    (function(){ var miss=FAMILLES.filter(function(f){ return PRODUITS.indexOf(f)<0; }); if(miss.length) PRODUITS = miss.concat(PRODUITS); })();
    if(PRODUITS.indexOf("Remise")<0) PRODUITS.push("Remise");
    function persistProd(){ store.write("produits", PRODUITS); }
    var fraisCommuns = store.read("fraisCommuns", []);
    function persistFrais(){ store.write("fraisCommuns", fraisCommuns); }
    var argentMois = store.read("argentMois", {});
    function persistArgent(){ store.write("argentMois", argentMois); }
    function getArgent(p,m){ return (argentMois[p] && argentMois[p][m]) || 0; }
    function setArgent(p,m,v){ if(!argentMois[p]) argentMois[p]={}; argentMois[p][m]=v; persistArgent(); }
    var virements = store.read("virements", []);
    function persistVirements(){ store.write("virements", virements); }
    var soldeInit = store.read("soldeInit", {});
    function persistSoldeInit(){ store.write("soldeInit", soldeInit); }
    function getSoldeInit(p,m){ return (soldeInit[p] && (m in soldeInit[p])) ? Number(soldeInit[p][m]) : null; }
    function setSoldeInit(p,m,v){ if(!soldeInit[p]) soldeInit[p]={}; soldeInit[p][m]=v; persistSoldeInit(); }
    function clearSoldeInit(p,m){ if(soldeInit[p]) delete soldeInit[p][m]; persistSoldeInit(); }
    function virementsOf(p,m){ return virements.filter(function(v){ return v.person===p && v.month===m; }); }
    function virementsSum(p,m){ return virementsOf(p,m).reduce(function(t,v){ return t+(Number(v.montant)||0); },0); }
    function prevMonthKey(m){ var a=m.split("-"), Y=+a[0], M=+a[1]-1; if(M<1){ M=12; Y--; } return Y+"-"+(M<10?"0"+M:M); }
    function applyEp(accId, delta){
      var a=epargne.filter(function(x){ return String(x.id)===String(accId); })[0];
      if(!a || a.bourseLink) return;
      if(!a.vals) a.vals={};
      a.vals[monthKey(todayISO())] = epCurrent(a) + delta;
      persistEpargne();
    }
    function epNameOf(id){ if(!id) return ""; var a=epargne.filter(function(x){ return String(x.id)===String(id); })[0]; return a?a.nom:""; }
    function chooseEpargne(){
      var linkable=epargne.filter(function(c){ return !c.bourseLink; });
      if(!linkable.length) return null;
      var menu="Rattacher à un compte épargne ?\nLe montant y sera retiré (entrée) ou versé (sortie) automatiquement.\n\n0 = Non\n";
      linkable.forEach(function(c,i){ menu+=(i+1)+" = "+c.nom+"\n"; });
      var ch=window.prompt(menu,"0");
      if(ch===null) return null;
      var idx=parseInt(ch,10);
      if(idx>=1 && idx<=linkable.length) return linkable[idx-1].id;
      return null;
    }
    function addVirement(){
      var label=window.prompt("Libellé du virement (ex. Salaire, Virement sortant…) :","");
      if(label===null) return;
      var note=window.prompt("Description / commentaire (optionnel) :","");
      var mv=window.prompt("Montant (€) :",""); if(mv===null) return;
      var m=Math.abs(num(mv));
      var entree=window.confirm("Sens du virement :\nOK = Entrée (+)\nAnnuler = Sortie (−)");
      var montant = entree?m:-m;
      var epId=chooseEpargne();
      var v={ id:Date.now(), person:"Benoit", month:monthKey(todayISO()), label:(label||"").trim()||"Virement", note:(note||"").trim(), montant: montant };
      if(epId){ v.epargneId=epId; v.epApplied=-montant; applyEp(epId, -montant); }
      virements.push(v);
      persistVirements(); render();
    }
    function editVirement(id){
      var v=virements.filter(function(x){ return String(x.id)===String(id); })[0]; if(!v) return;
      var label=window.prompt("Libellé :", v.label); if(label!==null && label.trim()) v.label=label.trim();
      var note=window.prompt("Description / commentaire (optionnel) :", v.note||""); if(note!==null) v.note=note.trim();
      var mv=window.prompt("Montant (€) :", String(v.montant).replace(".",",")); if(mv!==null){
        var newM=num(mv);
        if(v.epargneId){ var delta=-(newM - v.montant); applyEp(v.epargneId, delta); v.epApplied=(v.epApplied||0)+delta; }
        v.montant=newM;
      }
      persistVirements(); render();
    }
    function delVirement(id){
      if(!window.confirm("Supprimer ce virement ?")) return;
      var v=virements.filter(function(x){ return String(x.id)===String(id); })[0];
      if(v && v.epargneId){ applyEp(v.epargneId, -(v.epApplied||0)); }
      virements=virements.filter(function(x){ return String(x.id)!==String(id); });
      persistVirements(); render();
    }
    function computeDepensesMonth(person, month){
      var me=state.entries.filter(function(e){ return monthKey(e.date)===month; });
      var paid=0; me.forEach(function(e){ if((e.payePar||"").trim()===person) paid+=Number(e.montant)||0; });
      var fr=fraisCommuns.filter(function(f){ return f.recurrent || f.month===month; });
      var fp=0, fc=0; fr.forEach(function(f){ var who=(f.personne||"").trim()||"Commun"; var m=Number(f.montant)||0; if(who===person) fp+=m; else if(who==="Commun") fc+=m; });
      var po=0; me.forEach(function(e){ if((e.payePar||"").trim()===person) return; (e.articles||[]).forEach(function(a){ if(a.commun) po+=Number(a.prix)||0; }); });
      return paid+fp+fc/2+po/2;
    }
    function compteMonths(person, upto){
      var set={};
      state.entries.forEach(function(e){ var m=monthKey(e.date); if(m && m<=upto) set[m]=true; });

    function parseTicket(text){
      var lines = text.split(/\n/).map(function(l){return l.trim();}).filter(Boolean);
      var amtRe = /(\d{1,4})[.,](\d{2})\b/g;
      var key = /total|a payer|à payer|net a|net à|montant|carte|especes|espèces|rendu|tva/i;
      var all = [], lignes = [];
      lines.forEach(function(l){
        var m, last=null; amtRe.lastIndex=0;
        while((m=amtRe.exec(l))){ all.push({ value: parseFloat(m[1]+"."+m[2]), line:l }); last=m; }
        if(key.test(l) || !last) return;
        var prix = parseFloat(last[1]+"."+last[2]);
        var label = l.replace(/(\d{1,4})[.,](\d{2})\b/g," ").replace(/[^0-9A-Za-zÀ-ÿ ]+/g," ").replace(/\s+/g," ").trim();
        if(label.length < 2) return;
        lignes.push({ label: label.slice(0,28), prix: String(prix).replace(".",","), produit:"" });
      });
      var flagged = all.filter(function(a){ return /total|a payer|à payer|net a|net à|montant/i.test(a.line); });
      var total = "";
      if(flagged.length) total = Math.max.apply(null, flagged.map(function(a){return a.value;}));
      else if(all.length) total = Math.max.apply(null, all.map(function(a){return a.value;}));
      var date="";
      var dm = text.match(/\b(\d{2})[\/.\-](\d{2})[\/.\-](\d{2,4})\b/);
      if(dm){ var y=dm[3].length===2?"20"+dm[3]:dm[3]; date=y+"-"+dm[2]+"-"+dm[1]; }
      var marchand="";
      for(var i=0;i<lines.length;i++){ if(/[A-Za-zÀ-ÿ]{3,}/.test(lines[i])){ marchand=lines[i].slice(0,32); break; } }
      return { total: total, date: date, marchand: marchand, categorie: guessCat(text), lignes: lignes };
    }

    function editEntry(id){
      var e=state.entries.filter(function(x){ return String(x.id)===String(id); })[0];
      if(!e) return;
      state.draft={id:e.id,montant:e.montant,date:e.date,marchand:e.marchand,categorie:e.categorie,payePar:e.payePar||"",photo:photoOf(e),

      state.view="form"; render();

    function saveDraft(){
      readForm();
      var montant=num(state.draft.montant);
      if(!montant){ var f=document.getElementById("f-montant"); if(f) f.focus(); return; }
      var arts=(state.draft.articles||[]).map(function(a){
          var pr=num(a.prix), prod=(a.produit==="__new"?"":a.produit)||"";
          if(prod==="Remise") pr=-Math.abs(pr);
          return {label:(a.label||"").trim(), prix:pr, produit:prod, commun:!!a.commun};
        }).filter(function(a){ return a.label || a.produit || a.prix; });
      var entry={ id:state.draft.id, montant:montant, date:state.draft.date||todayISO(),
        marchand:(state.draft.marchand||"").trim()||"Sans nom", categorie:state.draft.categorie, payePar:(state.draft.payePar||""), articles:arts, photo:(state.draft.photo||"") };
      arts.forEach(function(a){ if(a.produit && a.label){ APPRIS[norm(a.label)]=a.produit; } });
      persistAppris();
      var isNew=!entry.id;
      if(isNew) entry.id=Date.now();
      var dp=state.draft.photo;
      if(typeof dp==="string" && dp.indexOf("data:")===0){ entry.photo=true; PHOTOS[String(entry.id)]=dp; idbPut(entry.id,dp); }
      else { entry.photo=false; delete PHOTOS[String(entry.id)]; idbDel(entry.id); }
      if(isNew){ state.entries.unshift(entry); }
      else { state.entries=state.entries.map(function(e){ return String(e.id)===String(entry.id)?entry:e; }); }
      persist(); state.view="list"; state.draft=null; render();
    }
    function delDraft(){
      if(state.draft && state.draft.id){ idbDel(state.draft.id); delete PHOTOS[String(state.draft.id)]; state.entries=state.entries.filter(function(e){ return String(e.id)!==String(state.draft.id); }); persist(); }
      state.view="list"; state.draft=null; render();
    }

    function uniquePersons(){
      var set={}, arr=[];
      function add(w){ w=(w||"").trim(); if(w && w!=="Commun" && !set[w]){ set[w]=1; arr.push(w); } }
      fraisCommuns.forEach(function(f){ add(f.personne); });
      state.entries.forEach(function(e){ add(e.payePar); });
      arr.sort(); return arr;
    }
    function choosePerson(current){
      var ex=uniquePersons();
      if(ex.indexOf("Commun")<0) ex.unshift("Commun");
      var hint = "\nChoix : "+ex.map(function(p,i){ return (i+1)+". "+p; }).join("   ");
      var ans=window.prompt("Pour qui ce frais ?\n(« Commun » = dépense partagée)"+hint+"\n\nTape un nom ou le numéro", current||"Commun");
      if(ans===null) return null;
      ans=ans.trim();
      if(!ans) return current||"Commun";
      if(/^\d+$/.test(ans)){ var n=parseInt(ans,10); if(n>=1 && n<=ex.length) return ex[n-1]; }
      return ans;
    }
    function addFraisCommun(){
      var label=(window.prompt("Nom du frais (ex. Loyer, Internet) :")||"").trim();
      if(!label) return;
      var mv=window.prompt("Montant (€) :","");
      if(mv===null) return;
      var who=choosePerson(null);
      if(who===null) return;
      var rec=window.confirm("Récurrent chaque mois ?\n\nOK = chaque mois · Annuler = seulement ce mois-ci");
      fraisCommuns.push({ id:Date.now(), label:label, montant:num(mv), personne:who, recurrent:rec, month: rec?null:monthKey(todayISO()) });
      persistFrais(); render();
    }
    function editFraisCommun(id){
      var f=fraisCommuns.filter(function(x){ return String(x.id)===String(id); })[0]; if(!f) return;
      var label=(window.prompt("Nom du frais :", f.label)||"").trim(); if(label) f.label=label;
      var mv=window.prompt("Montant (€) :", String(f.montant).replace(".",",")); if(mv!==null) f.montant=num(mv);
      var who=choosePerson(f.personne); if(who!==null) f.personne=who;
      persistFrais(); render();
    }

    function fetchSolPrice(){
      if(state.solLoading) return;
      state.solLoading=true; state.solError=""; render();
      fetch("https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=eur")
        .then(function(r){ return r.json(); })
        .then(function(j){
          var p=j&&j.solana&&j.solana.eur;
          if(!p) throw new Error("Donnée manquante");
          state.solPrice=p;
          state.prixActuel=String(p).replace(".",",");
          state.solTime=new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
          state.solError=""; state.solLoading=false; render();
        })
        .catch(function(e){
          state.solError="Erreur : "+(e&&e.message?e.message:"connexion");
          state.solLoading=false; render();
        });
    }

    function makeCanvas(srcImg, w0, h0){
      var longest=Math.max(w0,h0), scale=1;
      if(w0<1600) scale=1600/w0;
      if(longest*scale>2000) scale=2000/longest;
      var w=Math.max(1,Math.round(w0*scale)), h=Math.max(1,Math.round(h0*scale));
      var c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(srcImg,0,0,w,h);
      return c;
    }
    function enhance(c){
      try{
        var ctx=c.getContext("2d"), d=ctx.getImageData(0,0,c.width,c.height), p=d.data, i, g, min=255, max=0;
        var lum=new Uint8ClampedArray(c.width*c.height);
        for(i=0;i<p.length;i+=4){ g=(p[i]*0.299+p[i+1]*0.587+p[i+2]*0.114)|0; lum[i>>2]=g; if(g<min)min=g; if(g>max)max=g; }
        var range=(max-min)||1;
        for(i=0;i<p.length;i+=4){ var v=(lum[i>>2]-min)*255/range; v=(v-128)*1.4+128; if(v<0)v=0; else if(v>255)v=255; p[i]=p[i+1]=p[i+2]=v; }
        ctx.putImageData(d,0,0);
      }catch(e){}
      return c;
    }
    function preprocess(file){
      return new Promise(function(resolve){
        function viaImg(){
          try{
            var img=new Image();
            img.onload=function(){ try{ resolve(enhance(makeCanvas(img,img.width,img.height))); }catch(e){ resolve(file); } };
            img.onerror=function(){ resolve(file); };
            img.src=URL.createObjectURL(file);
          }catch(e){ resolve(file); }
        }
        try{
          if(self.createImageBitmap){
            createImageBitmap(file).then(function(bmp){
              try{ var c=makeCanvas(bmp,bmp.width,bmp.height); try{ bmp.close(); }catch(e){} resolve(enhance(c)); }
              catch(e){ viaImg(); }
            }).catch(viaImg);
          } else viaImg();
        }catch(e){ viaImg(); }
      });
    }

    function canvasToBlob(src){
      return new Promise(function(resolve){
        function compress(canvas){
          var quals=[0.7,0.55,0.42,0.32,0.25], steps=0;
          (function attempt(qi){
            steps++;
            if(qi>=quals.length){
              if(canvas.width<=900 || steps>16){ canvas.toBlob(function(b){ resolve(b||src); }, "image/jpeg", 0.4); return; }
              var nc=document.createElement("canvas");
              nc.width=Math.max(1,Math.round(canvas.width*0.8));
              nc.height=Math.max(1,Math.round(canvas.height*0.8));
              nc.getContext("2d").drawImage(canvas,0,0,nc.width,nc.height);
              canvas=nc; attempt(0); return;
            }
            canvas.toBlob(function(b){
              if(!b){ resolve(src); return; }
              if(b.size<=950000){ resolve(b); return; }
              attempt(qi+1);
            }, "image/jpeg", quals[qi]);
          })(0);
        }
        if(src && src.toBlob){ compress(src); return; }
        function smallFrom(srcImg, w0, h0){ var lo=Math.max(w0,h0), s=lo>2000?2000/lo:1; var c=document.createElement("canvas"); c.width=Math.max(1,Math.round(w0*s)); c.height=Math.max(1,Math.round(h0*s)); c.getContext("2d").drawImage(srcImg,0,0,c.width,c.height); return c; }
        function viaImg(){ try{ var img=new Image(); img.onload=function(){ try{ compress(smallFrom(img,img.width,img.height)); }catch(e){ resolve(src); } }; img.onerror=function(){ resolve(src); }; img.src=URL.createObjectURL(src); }catch(e){ resolve(src); } }
        try{
          if(self.createImageBitmap){ createImageBitmap(src).then(function(bmp){ try{ var c=smallFrom(bmp,bmp.width,bmp.height); try{ bmp.close(); }catch(e){} compress(c); }catch(e){ viaImg(); } }).catch(viaImg); }
          else viaImg();
        }catch(e){ viaImg(); }
      });
    }
    function ocrCloud(blob){
      var key=store.read("ocrKey","");
      if(!key) return Promise.reject(new Error("pas de cle"));
      var fd=new FormData();
      fd.append("apikey", key); fd.append("language","fre"); fd.append("OCREngine","2");
      fd.append("isTable","true"); fd.append("scale","true");
      fd.append("file", blob, "ticket.jpg");
      return fetch("https://api.ocr.space/parse/image",{ method:"POST", body:fd })
        .then(function(r){ return r.json(); })
        .then(function(j){
          if(j.IsErroredOnProcessing) throw new Error((j.ErrorMessage&&j.ErrorMessage[0])||"erreur OCR cloud");
          return (j.ParsedResults&&j.ParsedResults[0]&&j.ParsedResults[0].ParsedText)||"";
        });
    }

    filein.onchange=function(ev){

      state.view="form"; render();
      if(files[0]) fileToThumb(files[0], function(t){ if(t && state.draft && state.view==="form"){ state.draft.photo=t; render(); } });
      function tessText(src){ return Tesseract.recognize(src, "fra+eng", { logger:function(m){
          if(m.status==="recognizing text"){ state.prog=Math.round(m.progress*100); var bar=document.getElementById("bar"); if(bar) bar.style.width=state.prog+"%"; }
        }}).then(function(r){ return (r.data&&r.data.text)||""; }); }
      var diag=[];
      function localOne(src){ return (typeof Tesseract==="undefined") ? Promise.resolve("") : tessText(src).then(function(t){ diag.push("local:"+(t||"").length); return t; }); }
      function ocrOne(file){
        return preprocess(file).then(function(src){
          if(!(src && src.toBlob)) diag.push("preproc-KO");
          if(store.read("ocrKey","")){
            return canvasToBlob(src).then(function(blob){
              var ko = (blob && blob.size) ? Math.round(blob.size/1024) : "?";
              return ocrCloud(blob).then(function(t){ diag.push("cloud "+ko+"Ko:"+(t||"").length+"car"); return t; });
            }).catch(function(e){ diag.push("cloud KO("+((e&&e.message)||e)+")"); return localOne(src); });
          }
          return localOne(src);
        });
      }
      var texts=[], idx=0;
      function step(){
        if(idx>=files.length){
          var p=parseTicket(texts.join("\n"));
          state.draft.montant = (p.total==="")?"":String(p.total).replace(".",",");
          state.draft.date = p.date || state.draft.date;

          var hasData = state.draft.montant || (state.draft.articles && state.draft.articles.length);
          state.note = hasData ? "" : ("Lecture vide ["+diag.join(" · ")+"]. Réessaie avec une photo plus nette, ou recadrée sur le ticket.");
          state.busy=false; state.scanMsg=""; render(); return;
        }
        if(files.length>1){ var sm=document.getElementById("scanmsg"); if(sm) sm.textContent="Lecture "+(idx+1)+"/"+files.length+"…"; state.prog=0; var bar=document.getElementById("bar"); if(bar) bar.style.width="0%"; }
        ocrOne(files[idx]).then(function(t){ texts.push(t||""); idx++; step(); })
          .catch(function(e){ console.warn("OCR indisponible:", e); texts.push(""); idx++; step(); });
      }
      step();
    };

    function fileToThumb(file, cb){

          img.onload=function(){
            var max=600, w=img.width||1, hh=img.height||1, sc=Math.min(1, max/Math.max(w,hh));
            var cw=Math.max(1,Math.round(w*sc)), ch=Math.max(1,Math.round(hh*sc));
            var cv=document.createElement("canvas"); cv.width=cw; cv.height=ch;
            cv.getContext("2d").drawImage(img,0,0,cw,ch);
            try{ cb(cv.toDataURL("image/jpeg",0.5)); }catch(e){ cb(""); }
          };
          img.onerror=function(){ cb(""); };
          img.src=r.result;
        };

      }catch(e){ cb(""); }

        if(!IDB){ rej(new Error("no-idb")); return; }
        try{ var rq=IDB.open("ticketsdb",1);
          rq.onupgradeneeded=function(){ var db=rq.result; if(!db.objectStoreNames.contains("photos")) db.createObjectStore("photos"); };
          rq.onsuccess=function(){ _db=rq.result; res(_db); };
          rq.onerror=function(){ rej(rq.error); };
        }catch(e){ rej(e); }
      });
    }
    function idbAll(){
      return idbOpen().then(function(db){ return new Promise(function(res){
        var out={};
        try{ var cur=db.transaction("photos","readonly").objectStore("photos").openCursor();
          cur.onsuccess=function(){ var c=cur.result; if(c){ out[c.key]=c.value; c.continue(); } else res(out); };
          cur.onerror=function(){ res(out); };
        }catch(e){ res(out); }
      }); });
    }
    function idbPut(id,val){ return idbOpen().then(function(db){ return new Promise(function(res){ try{ var tx=db.transaction("photos","readwrite"); tx.objectStore("photos").put(val,String(id)); tx.oncomplete=function(){res(true);}; tx.onerror=function(){res(false);}; }catch(e){ res(false); } }); }).catch(function(){ return false; }); }
    function idbDel(id){ return idbOpen().then(function(db){ return new Promise(function(res){ try{ var tx=db.transaction("photos","readwrite"); tx.objectStore("photos").delete(String(id)); tx.oncomplete=function(){res(true);}; tx.onerror=function(){res(false);}; }catch(e){ res(false); } }); }).catch(function(){ return false; }); }
    function photoOf(e){ return PHOTOS[String(e.id)] || (typeof e.photo==="string" && e.photo.indexOf("data:")===0 ? e.photo : ""); }
    function initPhotos(){
      var migr=[];
      state.entries.forEach(function(e){ if(typeof e.photo==="string" && e.photo.indexOf("data:")===0) migr.push(e); });
      var chain=Promise.resolve();
      if(migr.length && IDB){
        migr.forEach(function(e){ chain=chain.then(function(){ return idbPut(e.id, e.photo).then(function(ok){ if(ok){ PHOTOS[String(e.id)]=e.photo; e.photo=true; } }); }); });
        chain=chain.then(function(){ persist(); });
      }
      chain.then(function(){ return IDB?idbAll():{}; }).then(function(map){ for(var k in map){ PHOTOS[k]=map[k]; } idbReady=true; render(); }).catch(function(){ idbReady=true; });
    }
    function delPhotoFor(id){
      idbDel(id); delete PHOTOS[String(id)];
      state.entries=state.entries.map(function(e){ if(String(e.id)===String(id)) e.photo=false; return e; });
      persist(); render();
    }
    function renderGallery(){
      var list=state.entries.filter(function(e){ return photoOf(e); });
      var h=header("list")+'<section class="paper">';
      h+='<div class="center muted" style="font-size:11px;letter-spacing:.18em;text-transform:uppercase">Galerie · '+list.length+' photo'+(list.length>1?"s":"")+'</div><hr class="rule">';
      if(!list.length){ h+='<div class="empty">Aucune photo de ticket pour le moment.<br>Scanne un ticket ou ajoute une photo depuis un ticket.</div>'; }
      else{
        h+='<div class="gallery">';
        list.forEach(function(e){
          var ph=photoOf(e);
          h+='<div class="gtile">'+
               '<div class="gimg" data-id="'+esc(e.id)+'" style="background-image:url(\''+ph+'\')"></div>'+
               '<button class="gdel" type="button" data-id="'+esc(e.id)+'">✕</button>'+
               '<div class="gcap"><span class="gn">'+esc(e.marchand)+'</span><span class="ga">'+fmt(e.montant)+'</span></div>'+
             '</div>';
        });
        h+='</div>';
        h+='<div class="muted" style="font-size:10px;margin-top:12px;text-align:center">Touche une photo pour l\'agrandir · ✕ pour la supprimer</div>';
      }
      h+='</section>';
      app.innerHTML=h;
      setNav(null,false);
      bindBack(function(){ state.view="list"; render(); });
      [].forEach.call(document.querySelectorAll(".gimg"), function(el){ el.onclick=function(){ state.photoId=el.getAttribute("data-id"); state.view="photo"; render(); }; });
      [].forEach.call(document.querySelectorAll(".gdel"), function(b){ b.onclick=function(){ var id=b.getAttribute("data-id"); if(!window.confirm("Supprimer la photo de ce ticket ?\n(le ticket est conservé)")) return; delPhotoFor(id); }; });
    }
    function renderPhoto(){
      var e=state.entries.filter(function(x){ return String(x.id)===String(state.photoId); })[0];
      var ph=e?photoOf(e):"";
      if(!ph){ state.view="gallery"; return renderGallery(); }
      var dt=(e.date||"").split("-").reverse().join("/");
      var h='<div class="lightbox">';
      h+='<div class="lbtop"><button class="lbx" id="lbclose" type="button">‹</button><div class="lbcap"><div class="lbn">'+esc(e.marchand)+' · '+fmt(e.montant)+'</div><div class="lbm">'+esc(dt)+' · '+esc(e.categorie)+'</div></div></div>';
      h+='<div class="lbimg"><img src="'+ph+'" alt=""></div>';
      h+='<div class="lbbtns"><button class="btn ghost" id="lbopen" type="button">Ouvrir le ticket</button><button class="btn ghost" id="lbdel" type="button">Supprimer la photo</button></div>';
      h+='</div>';
      app.innerHTML=h;
      setNav(null,false);
      document.getElementById("lbclose").onclick=function(){ state.view="gallery"; render(); };
      document.getElementById("lbopen").onclick=function(){ editEntry(state.photoId); };
      document.getElementById("lbdel").onclick=function(){ if(!window.confirm("Supprimer la photo de ce ticket ?\n(le ticket est conservé)")) return; state.view="gallery"; delPhotoFor(state.photoId); };
    }
    function renderPatrimoine(){
      var month=monthKey(todayISO());
      var solde=computeCompteMonth("Benoit", month).solde;
      var epManuel=0, epLies=0;
      epargne.forEach(function(c){ if(c.bourseLink) epLies+=epCurrent(c); else epManuel+=epCurrent(c); });
      var bourseTot=bourseTotalLive();
      var net=solde+epManuel+bourseTot;
      var h=header("list")+'<section class="paper">';
      h+='<div class="center muted" style="font-size:11px;letter-spacing:.18em;text-transform:uppercase">Patrimoine</div><hr class="rule">';
      h+='<div class="leader fam"><span class="lbl">Compte courant</span><span class="fill"></span><span class="val">'+fmt(solde)+'</span></div>';
      h+='<div class="leader fam"><span class="lbl">Épargne (hors Bourse)</span><span class="fill"></span><span class="val">'+fmt(epManuel)+'</span></div>';
      h+='<div class="leader fam"><span class="lbl">Bourse (portefeuille)</span><span class="fill"></span><span class="val">'+fmt(bourseTot)+'</span></div>';
      h+='<hr class="rule"><div class="leader total"><span class="lbl">Patrimoine net</span><span class="fill"></span><span class="val" style="font-size:22px;color:'+(net<0?"#f4796b":"#4fd6a0")+'">'+fmt(net)+'</span></div>';
      if(epLies>0) h+='<div class="muted" style="font-size:10px;margin:6px 2px 0">Ton compte épargne lié à la Bourse ('+fmt(epLies)+') n\'est pas recompté ici : il est déjà inclus dans la ligne « Bourse ».</div>';
      h+='<hr class="rule"><div class="muted" style="font-size:11px;letter-spacing:.06em;text-transform:uppercase;margin:0 2px 6px">Répartition</div>';
      h+=gBlock([{name:"Compte",value:solde},{name:"Épargne",value:epManuel},{name:"Bourse",value:bourseTot}]);
      h+='</section>';
      app.innerHTML=h;
      setNav(null,false);
      bindBack(function(){ state.view="list"; render(); });
    }
    var provisions = store.read("provisions", []);
    function persistProvisions(){ store.write("provisions", provisions); }
    function monthsBetween(a,b){ var pa=a.split("-"), pb=b.split("-"); return (parseInt(pb[0],10)*12+parseInt(pb[1],10)) - (parseInt(pa[0],10)*12+parseInt(pa[1],10)); }
    function provBalance(p, month){
      var m=month||monthKey(todayISO());
      var n=Math.max(0, monthsBetween(p.startMonth||m, m));
      var acc=(Number(p.soldeInitial)||0) + (Number(p.mensuel)||0)*n;
      var out=0; (p.prelevements||[]).forEach(function(pr){ if((pr.month||"")<=m) out+=Number(pr.montant)||0; });
      return acc-out;
    }
    function addProvision(){
      var nom=(window.prompt("Nom de la provision (ex. Impôt foncier, Assurance, Eau) :")||"").trim();
      if(!nom) return;
      var mens=window.prompt("Montant mis de côté chaque mois (€) :",""); if(mens===null) return;
      var init=window.prompt("Montant déjà de côté aujourd'hui (€) — 0 si rien :","0"); if(init===null) return;
      provisions.push({ id:Date.now(), nom:nom, mensuel:num(mens), soldeInitial:num(init), startMonth:monthKey(todayISO()), prelevements:[] });
      persistProvisions(); render();
    }
    function editProvision(id){
      var p=provisions.filter(function(x){ return String(x.id)===String(id); })[0]; if(!p) return;
      var nom=(window.prompt("Nom :", p.nom)||"").trim(); if(nom) p.nom=nom;
      var mens=window.prompt("Montant mensuel (€) :", String(p.mensuel).replace(".",",")); if(mens!==null) p.mensuel=num(mens);
      var init=window.prompt("Montant de départ (€) au mois de "+(p.startMonth||"")+" :", String(p.soldeInitial||0).replace(".",",")); if(init!==null) p.soldeInitial=num(init);
      persistProvisions(); render();
    }
    function delProvision(id){
      if(!window.confirm("Supprimer cette provision ?")) return;
      provisions=provisions.filter(function(x){ return String(x.id)!==String(id); });
      persistProvisions(); render();
    }
    function addPrelevement(id){
      var p=provisions.filter(function(x){ return String(x.id)===String(id); })[0]; if(!p) return;
      var label=window.prompt("Libellé du prélèvement (ex. Facture novembre) :",""); if(label===null) return;
      var mv=window.prompt("Montant prélevé (€) :",""); if(mv===null) return;
      var mois=window.prompt("Mois du prélèvement (AAAA-MM) — vide = ce mois-ci :","");
      var m=(mois && /^[0-9]{4}-[0-9]{2}$/.test(mois.trim()))?mois.trim():monthKey(todayISO());
      if(!p.prelevements) p.prelevements=[];
      p.prelevements.push({ id:Date.now(), month:m, montant:Math.abs(num(mv)), label:(label||"").trim()||"Prélèvement" });
      persistProvisions(); render();
    }
    function delPrelevement(id, prid){
      var p=provisions.filter(function(x){ return String(x.id)===String(id); })[0]; if(!p) return;
      p.prelevements=(p.prelevements||[]).filter(function(x){ return String(x.id)!==String(prid); });
      persistProvisions(); render();
    }
    function renderProvisions(){
      var month=monthKey(todayISO());
      var h=header("list")+'<section class="paper">';
      h+='<div class="center muted" style="font-size:11px;letter-spacing:.18em;text-transform:uppercase">Provisions · mise de côté</div><hr class="rule">';
      if(!provisions.length){ h+='<div class="empty">Aucune provision.<br>Crée une enveloppe pour tes frais annuels (taxe foncière, assurance, eau…) : tu mets un montant de côté chaque mois, le solde monte tout seul.</div>'; }
      var total=0;
      provisions.forEach(function(p){
        var bal=provBalance(p, month); total+=bal;
        h+='<div style="margin:14px 0 2px">';
        h+='<div class="prow"><span class="pname" style="font-weight:700">'+esc(p.nom)+'</span>'+
           '<span style="font-variant-numeric:tabular-nums;font-weight:700;flex:0 0 auto;margin-right:4px;color:'+(bal<0?"#f4796b":"#4fd6a0")+'">'+fmt(bal)+'</span>'+
           '<button class="btn ghost predit" type="button" data-id="'+esc(p.id)+'">✎</button>'+
           '<button class="btn ghost prdel" type="button" data-id="'+esc(p.id)+'">✕</button></div>';
        h+='<div class="muted" style="font-size:10px;margin:1px 6px 0">+ '+fmt(p.mensuel)+' / mois</div>';
        var prs=(p.prelevements||[]).slice().sort(function(a,b){ return (a.month<b.month)?1:-1; });
        prs.forEach(function(pr){
          h+='<div style="display:flex;align-items:center;gap:6px;padding:6px 4px 0 12px;font-size:12px">'+
             '<span style="flex:1;min-width:0;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">↓ '+esc(pr.label)+' · '+esc(pr.month)+'</span>'+
             '<span style="color:#f4796b;font-variant-numeric:tabular-nums;flex:0 0 auto">-'+fmt(pr.montant)+'</span>'+
             '<button class="btn ghost prldel" type="button" data-id="'+esc(p.id)+'" data-pr="'+esc(pr.id)+'" style="padding:6px 9px;flex:0 0 auto">✕</button>'+
             '</div>';
        });
        h+='<button class="btn ghost addprl" type="button" data-id="'+esc(p.id)+'" style="margin-top:8px;font-size:12px">+ Prélèvement (facture payée)</button>';
        h+='<hr class="rule" style="margin:12px 0 0;opacity:.3"></div>';
      });
      h+='<button class="btn ghost" id="addprov" type="button" style="margin-top:8px">+ Ajouter une provision</button>';
      h+='<hr class="rule"><div class="leader total"><span class="lbl">Total provisionné</span><span class="fill"></span><span class="val" style="color:'+(total<0?"#f4796b":"#4fd6a0")+'">'+fmt(total)+'</span></div>';
      h+='<div class="muted" style="font-size:10px;margin:6px 2px 0">Le solde monte tout seul du montant mensuel. Enregistre un prélèvement quand la facture est payée.</div>';
      h+='</section>';
      app.innerHTML=h;
      setNav(null,false);
      bindBack(function(){ state.view="compte"; render(); });
      var ap=document.getElementById("addprov"); if(ap) ap.onclick=addProvision;
      [].forEach.call(document.querySelectorAll(".predit"), function(b){ b.onclick=function(){ editProvision(b.getAttribute("data-id")); }; });
      [].forEach.call(document.querySelectorAll(".prdel"), function(b){ b.onclick=function(){ delProvision(b.getAttribute("data-id")); }; });
      [].forEach.call(document.querySelectorAll(".addprl"), function(b){ b.onclick=function(){ addPrelevement(b.getAttribute("data-id")); }; });
      [].forEach.call(document.querySelectorAll(".prldel"), function(b){ b.onclick=function(){ delPrelevement(b.getAttribute("data-id"), b.getAttribute("data-pr")); }; });
    }
    function backupData(){
      var keys=["entries","cats","familles","produits","familleDe","appris","fraisCommuns","argentMois","virements","soldeInit","provisions","epargne","bourse","ocrKey","offlineReady"];
      var dump={ _app:"tickets", _version:1, _date:new Date().toISOString(), data:{} };
      keys.forEach(function(k){ var v=store.read(k, null); if(v!==null) dump.data[k]=v; });
      dump.photos = PHOTOS;
      try{
        var blob=new Blob([JSON.stringify(dump)], {type:"application/json"});
        var url=URL.createObjectURL(blob);
        var a=document.createElement("a");
        a.href=url; a.download="tickets-sauvegarde-"+todayISO()+".json";
        document.body.appendChild(a); a.click();
        store.write("lastBackup", new Date().toISOString());
        setTimeout(function(){ try{ document.body.removeChild(a); }catch(e){} URL.revokeObjectURL(url); }, 1500);
      }catch(e){ window.alert("Sauvegarde impossible : "+((e&&e.message)||e)); }
    }
    function restoreData(file){
      var r=new FileReader();
      r.onload=function(){
        try{
          var obj=JSON.parse(r.result);
          var data=(obj && obj.data && typeof obj.data==="object") ? obj.data : obj;
          if(!data || typeof data!=="object") throw new Error("format non reconnu");
          var n=(data.entries && data.entries.length) ? data.entries.length : 0;
          if(!window.confirm("Restaurer cette sauvegarde ?\n"+n+" ticket(s) vont REMPLACER les données actuelles.")) return;
          ["entries","cats","familles","produits","familleDe","appris","fraisCommuns","argentMois","virements","soldeInit","provisions","epargne","bourse","ocrKey","offlineReady"].forEach(function(k){
            if(k in data) store.write(k, data[k]);
          });
          var photos=(obj && obj.photos && typeof obj.photos==="object") ? obj.photos : null;
          function finishRestore(){ window.alert("Sauvegarde restaurée ✓"); window.location.reload(); }
          if(photos && IDB){ var ch=Promise.resolve(); Object.keys(photos).forEach(function(id){ ch=ch.then(function(){ return idbPut(id, photos[id]); }); }); ch.then(finishRestore).catch(finishRestore); }
          else { finishRestore(); }
        }catch(e){ window.alert("Fichier invalide : "+((e&&e.message)||e)); }
      };
      r.onerror=function(){ window.alert("Lecture du fichier impossible."); };
      r.readAsText(file);
    }
    restorein.onchange=function(ev){ var f=ev.target.files && ev.target.files[0]; if(ev.target) ev.target.value=""; if(f) restoreData(f); };

    function prepareOffline(){
      if(typeof Tesseract==="undefined"){ state.offline="error"; render(); return; }
      state.offline="loading"; render();
      Tesseract.createWorker("fra+eng")
        .then(function(w){ return w.terminate(); })
        .then(function(){ store.write("offlineReady", true); state.offline="ready"; render(); })
        .catch(function(err){ console.warn(err); state.offline="error"; render(); });
    }

    function tickBourse(){
      if(!bourse.some(function(c){ return c.sol; }) && !epargne.some(function(c){ return c.bourseLink; }) && state.view!=="bourse" && state.view!=="compte") return;
      fetch("https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=eur")
        .then(function(r){ return r.json(); })
        .then(function(j){
          var p=j&&j.solana&&j.solana.eur; if(!p) return;
          state.solPrice=p; state.solTime=new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
          var ae=document.activeElement, typing=ae&&/^(INPUT|SELECT|TEXTAREA)$/.test(ae.tagName||"");
          if(!typing) state.prixActuel=String(p).replace(".",",");
          syncBourseEpargne();
          if((state.view==="list"||state.view==="bourse"||state.view==="compte") && !typing) render();
        })
        .catch(function(){});
    }
    render();
    initPhotos();
    tickBourse();
    setInterval(tickBourse, 60000);

    if("serviceWorker" in navigator){
      window.addEventListener("load", function(){ navigator.serviceWorker.register("./sw.js").catch(function(){}); });
    }
  })();
  </script>
